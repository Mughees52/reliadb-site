# Decap CMS Configuration for ReliaDB
# ======================================
# This file controls the blog admin panel at /admin
# Documentation: https://decapcms.org/docs/

backend:
  name: git-gateway
  branch: main   # Change to "master" if your GitHub default branch is master

# Where media uploads are stored
media_folder: "images/uploads"
public_folder: "/images/uploads"

collections:
  - name: "categories"
    label: "Categories"
    label_singular: "Category"
    folder: "_categories"
    create: true
    slug: "{{slug}}"
    fields:
      - { label: "Title", name: "title", widget: "string" }
      - { label: "Slug", name: "slug", widget: "string", hint: "Use lowercase with hyphens, e.g. postgresql-replication" }
      - { label: "Description", name: "description", widget: "text", required: false }

  - name: "blog"
    label: "Blog Posts"
    folder: "_posts"
    create: true
    slug: "{{slug}}"
    fields:
      - { label: "Title", name: "title", widget: "string", hint: "Make it specific and problem-focused, e.g. 'PostgreSQL Running Slow? A Step-by-Step Diagnostic Guide'" }
      - { label: "Publish Date", name: "date", widget: "datetime" }
      - { label: "Description (SEO)", name: "description", widget: "string", hint: "150-160 characters. What problem does this post solve?" }
      - label: "Categories"
        name: "categories"
        widget: "relation"
        collection: "categories"
        search_fields: ["title", "slug"]
        value_field: "slug"
        display_fields: ["title"]
        multiple: true
        required: false
      - { label: "Read Time (minutes)", name: "read_time", widget: "number", default: 8 }
      - { label: "Featured Post", name: "featured", widget: "boolean", default: false, hint: "Show this post highlighted at the top of the blog" }
      - { label: "Body", name: "body", widget: "markdown", hint: "Write your post here. Use ## for headings, ``` for code blocks." }
