<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <linearGradient id="bg2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0D2B3E"/>
      <stop offset="100%" stop-color="#1A5276"/>
    </linearGradient>
    <linearGradient id="orange2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#E67E22"/>
      <stop offset="100%" stop-color="#D35400"/>
    </linearGradient>
    <linearGradient id="beaker" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#2980B9" stop-opacity="0.2"/>
      <stop offset="60%" stop-color="#2980B9" stop-opacity="0.2"/>
      <stop offset="60%" stop-color="#00758F" stop-opacity="0.6"/>
      <stop offset="100%" stop-color="#00758F" stop-opacity="0.8"/>
    </linearGradient>
    <pattern id="grid2" width="60" height="60" patternUnits="userSpaceOnUse">
      <path d="M 60 0 L 0 0 0 60" fill="none" stroke="#1A5276" stroke-width="0.5" opacity="0.3"/>
    </pattern>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg2)"/>
  <rect width="1200" height="630" fill="url(#grid2)"/>

  <!-- Decorative circles -->
  <circle cx="1000" cy="150" r="180" fill="#2980B9" opacity="0.05"/>
  <circle cx="150" cy="450" r="120" fill="#00758F" opacity="0.05"/>

  <!-- Upgrade series band -->
  <rect x="0" y="0" width="1200" height="6" fill="url(#orange2)"/>

  <!-- Split screen: Original DB (left) -->
  <g transform="translate(220, 180)">
    <!-- Panel -->
    <rect x="-120" y="-30" width="240" height="300" rx="12" fill="#0D2B3E" stroke="#00758F" stroke-width="2" opacity="0.8"/>
    <text x="0" y="-5" text-anchor="middle" font-family="sans-serif" font-size="14" fill="#00758F" font-weight="600">PRODUCTION</text>

    <!-- DB cylinder -->
    <rect x="-40" y="30" width="80" height="80" rx="4" fill="none" stroke="#00758F" stroke-width="2"/>
    <ellipse cx="0" cy="30" rx="40" ry="12" fill="#0D2B3E" stroke="#00758F" stroke-width="2"/>
    <ellipse cx="0" cy="110" rx="40" ry="12" fill="none" stroke="#00758F" stroke-width="2"/>

    <!-- Data rows -->
    <line x1="-25" y1="50" x2="25" y2="50" stroke="#00758F" stroke-width="1.5" opacity="0.5"/>
    <line x1="-25" y1="65" x2="25" y2="65" stroke="#00758F" stroke-width="1.5" opacity="0.5"/>
    <line x1="-25" y1="80" x2="25" y2="80" stroke="#00758F" stroke-width="1.5" opacity="0.5"/>

    <!-- Version label -->
    <rect x="-30" y="140" width="60" height="28" rx="6" fill="#00758F" opacity="0.3"/>
    <text x="0" y="159" text-anchor="middle" font-family="sans-serif" font-size="14" font-weight="700" fill="#00758F">8.0</text>

    <!-- Status dots -->
    <circle cx="-20" y="200" r="4" fill="#27AE60"/>
    <rect x="-8" y="196" width="50" height="8" rx="4" fill="#27AE60" opacity="0.3"/>
    <circle cx="-20" y="218" r="4" fill="#27AE60"/>
    <rect x="-8" y="214" width="40" height="8" rx="4" fill="#27AE60" opacity="0.3"/>
  </g>

  <!-- Arrow between -->
  <g transform="translate(450, 300)">
    <line x1="0" y1="0" x2="100" y2="0" stroke="#E67E22" stroke-width="2" stroke-dasharray="8,4"/>
    <polygon points="95,-8 110,0 95,8" fill="#E67E22"/>
    <text x="55" y="-15" text-anchor="middle" font-family="sans-serif" font-size="12" fill="#E67E22" opacity="0.8">TEST</text>
  </g>

  <!-- Split screen: Test DB (right) -->
  <g transform="translate(680, 180)">
    <!-- Panel -->
    <rect x="-120" y="-30" width="240" height="300" rx="12" fill="#0D2B3E" stroke="#2980B9" stroke-width="2" opacity="0.8"/>
    <text x="0" y="-5" text-anchor="middle" font-family="sans-serif" font-size="14" fill="#2980B9" font-weight="600">STAGING</text>

    <!-- DB cylinder -->
    <rect x="-40" y="30" width="80" height="80" rx="4" fill="none" stroke="#2980B9" stroke-width="2"/>
    <ellipse cx="0" cy="30" rx="40" ry="12" fill="#0D2B3E" stroke="#2980B9" stroke-width="2"/>
    <ellipse cx="0" cy="110" rx="40" ry="12" fill="none" stroke="#2980B9" stroke-width="2"/>

    <!-- Data rows -->
    <line x1="-25" y1="50" x2="25" y2="50" stroke="#2980B9" stroke-width="1.5" opacity="0.5"/>
    <line x1="-25" y1="65" x2="25" y2="65" stroke="#2980B9" stroke-width="1.5" opacity="0.5"/>
    <line x1="-25" y1="80" x2="25" y2="80" stroke="#2980B9" stroke-width="1.5" opacity="0.5"/>

    <!-- Version label -->
    <rect x="-30" y="140" width="60" height="28" rx="6" fill="#2980B9" opacity="0.3"/>
    <text x="0" y="159" text-anchor="middle" font-family="sans-serif" font-size="14" font-weight="700" fill="#2980B9">8.4</text>

    <!-- Test result indicators -->
    <circle cx="-20" y="200" r="4" fill="#27AE60"/>
    <rect x="-8" y="196" width="50" height="8" rx="4" fill="#27AE60" opacity="0.3"/>
    <circle cx="-20" y="218" r="4" fill="#E67E22"/>
    <rect x="-8" y="214" width="40" height="8" rx="4" fill="#E67E22" opacity="0.3"/>
    <circle cx="-20" y="236" r="4" fill="#27AE60"/>
    <rect x="-8" y="232" width="45" height="8" rx="4" fill="#27AE60" opacity="0.3"/>
  </g>

  <!-- Test beaker decorative -->
  <g transform="translate(960, 200)">
    <!-- Beaker outline -->
    <path d="M-25,-60 L-25,20 L-45,70 Q-50,85 -35,85 L35,85 Q50,85 45,70 L25,20 L25,-60 Z" fill="url(#beaker)" stroke="#2980B9" stroke-width="2"/>
    <!-- Beaker rim -->
    <line x1="-35" y1="-60" x2="35" y2="-60" stroke="#2980B9" stroke-width="3"/>
    <!-- Bubbles -->
    <circle cx="-10" cy="40" r="5" fill="none" stroke="#2980B9" stroke-width="1" opacity="0.6"/>
    <circle cx="10" cy="55" r="3" fill="none" stroke="#2980B9" stroke-width="1" opacity="0.6"/>
    <circle cx="0" cy="25" r="4" fill="none" stroke="#2980B9" stroke-width="1" opacity="0.6"/>
    <!-- Liquid level line -->
    <line x1="-30" y1="20" x2="30" y2="20" stroke="#00758F" stroke-width="1" opacity="0.4" stroke-dasharray="4,2"/>
  </g>

  <!-- Part 2 badge -->
  <rect x="1000" y="30" width="150" height="50" rx="25" fill="url(#orange2)"/>
  <text x="1075" y="62" text-anchor="middle" font-family="sans-serif" font-size="22" font-weight="700" fill="white">Part 2</text>

  <!-- Title -->
  <text x="60" y="580" font-family="sans-serif" font-size="28" font-weight="700" fill="white" opacity="0.9">MySQL 8.0 to 8.4 Upgrade</text>
  <text x="60" y="610" font-family="sans-serif" font-size="18" fill="#2980B9" opacity="0.8">Testing Strategy</text>

  <!-- ReliaDB brand mark -->
  <rect x="1130" y="570" width="44" height="44" rx="10" fill="#1A5276" stroke="#2980B9" stroke-width="1"/>
  <text x="1152" y="601" text-anchor="middle" font-family="sans-serif" font-size="26" font-weight="800" fill="white">R</text>
</svg>