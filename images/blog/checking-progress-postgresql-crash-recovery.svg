<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <linearGradient id="bg3" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0f1e30"/>
      <stop offset="50%" stop-color="#1A5276"/>
      <stop offset="100%" stop-color="#152a3e"/>
    </linearGradient>
    <linearGradient id="progressGrad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#f39c12"/>
      <stop offset="100%" stop-color="#f1c40f"/>
    </linearGradient>
    <linearGradient id="amberGlow" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#f39c12" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#f39c12" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="blockGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#2a5a7a"/>
      <stop offset="100%" stop-color="#1a3a5c"/>
    </linearGradient>
    <linearGradient id="blockDone" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#f39c12"/>
      <stop offset="100%" stop-color="#d68910"/>
    </linearGradient>
    <filter id="amberBlur">
      <feGaussianBlur stdDeviation="8" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="shadow3">
      <feDropShadow dx="0" dy="2" stdDeviation="5" flood-opacity="0.35"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg3)"/>

  <!-- Ambient glow behind progress ring -->
  <circle cx="420" cy="315" r="220" fill="url(#amberGlow)" opacity="0.4"/>

  <!-- Large circular progress indicator -->
  <g transform="translate(420, 315)" filter="url(#shadow3)">
    <!-- Background track -->
    <circle cx="0" cy="0" r="170" fill="none" stroke="#1a3050" stroke-width="24" opacity="0.8"/>

    <!-- Progress arc (~65% = ~234 degrees, starting from top) -->
    <!-- circumference = 2*pi*170 = ~1068. 65% = ~694 -->
    <circle cx="0" cy="0" r="170" fill="none" stroke="url(#progressGrad)" stroke-width="24"
            stroke-dasharray="694 1068" stroke-linecap="round"
            transform="rotate(-90)" filter="url(#amberBlur)"/>

    <!-- Inner circle -->
    <circle cx="0" cy="0" r="140" fill="#0f1e30" opacity="0.6"/>

    <!-- Percentage text -->
    <text x="0" y="-10" text-anchor="middle" font-family="sans-serif" font-weight="700" font-size="64" fill="#f1c40f">65%</text>
    <text x="0" y="25" text-anchor="middle" font-family="sans-serif" font-weight="400" font-size="16" fill="#8ab4d4" letter-spacing="2">RECOVERY</text>

    <!-- Tick marks around the ring -->
    <g stroke="#fff" stroke-width="1" opacity="0.2">
      <line x1="0" y1="-195" x2="0" y2="-185" transform="rotate(0)"/>
      <line x1="0" y1="-195" x2="0" y2="-188" transform="rotate(30)"/>
      <line x1="0" y1="-195" x2="0" y2="-185" transform="rotate(60)"/>
      <line x1="0" y1="-195" x2="0" y2="-188" transform="rotate(90)"/>
      <line x1="0" y1="-195" x2="0" y2="-185" transform="rotate(120)"/>
      <line x1="0" y1="-195" x2="0" y2="-188" transform="rotate(150)"/>
      <line x1="0" y1="-195" x2="0" y2="-185" transform="rotate(180)"/>
      <line x1="0" y1="-195" x2="0" y2="-188" transform="rotate(210)"/>
      <line x1="0" y1="-195" x2="0" y2="-185" transform="rotate(240)"/>
      <line x1="0" y1="-195" x2="0" y2="-188" transform="rotate(270)"/>
      <line x1="0" y1="-195" x2="0" y2="-185" transform="rotate(300)"/>
      <line x1="0" y1="-195" x2="0" y2="-188" transform="rotate(330)"/>
    </g>
  </g>

  <!-- Database blocks reassembling (right side) -->
  <!-- Complete blocks (recovered) -->
  <g filter="url(#shadow3)">
    <rect x="720" y="160" width="60" height="45" rx="6" fill="url(#blockDone)" opacity="0.9"/>
    <rect x="790" y="160" width="60" height="45" rx="6" fill="url(#blockDone)" opacity="0.9"/>
    <rect x="860" y="160" width="60" height="45" rx="6" fill="url(#blockDone)" opacity="0.9"/>

    <rect x="720" y="215" width="60" height="45" rx="6" fill="url(#blockDone)" opacity="0.9"/>
    <rect x="790" y="215" width="60" height="45" rx="6" fill="url(#blockDone)" opacity="0.9"/>
    <rect x="860" y="215" width="60" height="45" rx="6" fill="url(#blockDone)" opacity="0.85"/>

    <rect x="720" y="270" width="60" height="45" rx="6" fill="url(#blockDone)" opacity="0.85"/>
    <rect x="790" y="270" width="60" height="45" rx="6" fill="url(#blockDone)" opacity="0.8"/>

    <!-- In-progress blocks (partially filled) -->
    <rect x="860" y="270" width="60" height="45" rx="6" fill="url(#blockGrad)" stroke="#f39c12" stroke-width="1.5" stroke-dasharray="4,3"/>

    <!-- Pending blocks (empty) -->
    <rect x="720" y="325" width="60" height="45" rx="6" fill="url(#blockGrad)" stroke="#2a5a7a" stroke-width="1" opacity="0.5"/>
    <rect x="790" y="325" width="60" height="45" rx="6" fill="url(#blockGrad)" stroke="#2a5a7a" stroke-width="1" opacity="0.4"/>
    <rect x="860" y="325" width="60" height="45" rx="6" fill="url(#blockGrad)" stroke="#2a5a7a" stroke-width="1" opacity="0.35"/>

    <rect x="720" y="380" width="60" height="45" rx="6" fill="url(#blockGrad)" stroke="#2a5a7a" stroke-width="1" opacity="0.3"/>
    <rect x="790" y="380" width="60" height="45" rx="6" fill="url(#blockGrad)" stroke="#2a5a7a" stroke-width="1" opacity="0.25"/>
    <rect x="860" y="380" width="60" height="45" rx="6" fill="url(#blockGrad)" stroke="#2a5a7a" stroke-width="1" opacity="0.2"/>
  </g>

  <!-- Small checkmarks on completed blocks -->
  <g fill="none" stroke="#0f1e30" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
    <polyline points="738,185 748,193 762,177"/>
    <polyline points="808,185 818,193 832,177"/>
    <polyline points="878,185 888,193 902,177"/>
    <polyline points="738,240 748,248 762,232"/>
    <polyline points="808,240 818,248 832,232"/>
  </g>

  <!-- Connecting flow lines from ring to blocks -->
  <path d="M590 260 Q660 220 715 200" fill="none" stroke="#f39c12" stroke-width="1.5" stroke-dasharray="5,4" opacity="0.35"/>
  <path d="M590 315 Q660 310 715 310" fill="none" stroke="#f39c12" stroke-width="1.5" stroke-dasharray="5,4" opacity="0.25"/>
  <path d="M590 370 Q660 400 715 400" fill="none" stroke="#f39c12" stroke-width="1" stroke-dasharray="5,4" opacity="0.15"/>

  <!-- WAL segment icons (bottom left) -->
  <g transform="translate(100, 490)" opacity="0.3">
    <rect x="0" y="0" width="40" height="28" rx="4" fill="none" stroke="#f39c12" stroke-width="1.5"/>
    <line x1="8" y1="9" x2="32" y2="9" stroke="#f39c12" stroke-width="1"/>
    <line x1="8" y1="18" x2="25" y2="18" stroke="#f39c12" stroke-width="1"/>
  </g>
  <g transform="translate(155, 490)" opacity="0.25">
    <rect x="0" y="0" width="40" height="28" rx="4" fill="none" stroke="#f39c12" stroke-width="1.5"/>
    <line x1="8" y1="9" x2="32" y2="9" stroke="#f39c12" stroke-width="1"/>
    <line x1="8" y1="18" x2="25" y2="18" stroke="#f39c12" stroke-width="1"/>
  </g>
  <g transform="translate(210, 490)" opacity="0.2">
    <rect x="0" y="0" width="40" height="28" rx="4" fill="none" stroke="#8ab4d4" stroke-width="1.5"/>
    <line x1="8" y1="9" x2="32" y2="9" stroke="#8ab4d4" stroke-width="1"/>
    <line x1="8" y1="18" x2="25" y2="18" stroke="#8ab4d4" stroke-width="1"/>
  </g>

  <!-- Title text -->
  <text x="600" y="75" text-anchor="middle" font-family="sans-serif" font-weight="700" font-size="28" fill="#ffffff" letter-spacing="1">CRASH RECOVERY PROGRESS</text>
  <text x="600" y="580" text-anchor="middle" font-family="sans-serif" font-weight="400" font-size="16" fill="#8ab4d4" letter-spacing="2">POSTGRESQL MONITORING GUIDE</text>

  <!-- ReliaDB brand mark -->
  <g transform="translate(1140, 580)">
    <rect x="-22" y="-22" width="44" height="44" rx="10" fill="#1A5276"/>
    <text x="0" y="8" text-anchor="middle" font-family="sans-serif" font-weight="800" font-size="28" fill="#ffffff">R</text>
  </g>
</svg>