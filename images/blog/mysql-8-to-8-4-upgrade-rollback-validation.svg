<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <linearGradient id="bg4" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0D2B3E"/>
      <stop offset="100%" stop-color="#1A5276"/>
    </linearGradient>
    <linearGradient id="orange4" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#E67E22"/>
      <stop offset="100%" stop-color="#D35400"/>
    </linearGradient>
    <linearGradient id="shield4" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#2980B9"/>
      <stop offset="100%" stop-color="#1A5276"/>
    </linearGradient>
    <linearGradient id="green4" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#27AE60"/>
      <stop offset="100%" stop-color="#1E8449"/>
    </linearGradient>
    <pattern id="grid4" width="60" height="60" patternUnits="userSpaceOnUse">
      <path d="M 60 0 L 0 0 0 60" fill="none" stroke="#1A5276" stroke-width="0.5" opacity="0.3"/>
    </pattern>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg4)"/>
  <rect width="1200" height="630" fill="url(#grid4)"/>

  <!-- Decorative -->
  <circle cx="450" cy="300" r="220" fill="#2980B9" opacity="0.03"/>
  <circle cx="800" cy="280" r="180" fill="#27AE60" opacity="0.03"/>

  <!-- Upgrade series band -->
  <rect x="0" y="0" width="1200" height="6" fill="url(#orange4)"/>

  <!-- Shield -->
  <g transform="translate(400, 300)">
    <!-- Shield shape -->
    <path d="M0,-140 L-110,-90 L-110,30 Q-110,120 0,160 Q110,120 110,30 L110,-90 Z" fill="#0D2B3E" stroke="url(#shield4)" stroke-width="3"/>
    <!-- Shield inner glow -->
    <path d="M0,-120 L-90,-75 L-90,25 Q-90,100 0,135 Q90,100 90,25 L90,-75 Z" fill="#2980B9" opacity="0.08"/>
    <!-- Checkmark -->
    <polyline points="-40,10 -10,45 50,-35" fill="none" stroke="#27AE60" stroke-width="8" stroke-linecap="round" stroke-linejoin="round"/>
    <!-- Shield highlight -->
    <path d="M0,-140 L-110,-90 L-110,-30 L110,-30 L110,-90 Z" fill="#2980B9" opacity="0.05"/>
  </g>

  <!-- Rewind/undo arrow -->
  <g transform="translate(780, 240)">
    <!-- Circular arrow -->
    <path d="M60,0 A60,60 0 1,0 0,-60" fill="none" stroke="#E67E22" stroke-width="4" stroke-linecap="round"/>
    <!-- Arrow tip -->
    <polygon points="-15,-60 0,-75 5,-55" fill="#E67E22"/>
    <!-- Center text -->
    <text x="10" y="10" text-anchor="middle" font-family="sans-serif" font-size="16" font-weight="700" fill="#E67E22" opacity="0.8">UNDO</text>
  </g>

  <!-- Validation checkmarks stack -->
  <g transform="translate(800, 380)">
    <circle cx="0" cy="0" r="20" fill="none" stroke="#27AE60" stroke-width="2"/>
    <polyline points="-8,0 -3,6 10,-6" fill="none" stroke="#27AE60" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>

    <circle cx="60" cy="0" r="20" fill="none" stroke="#27AE60" stroke-width="2"/>
    <polyline points="52,0 57,6 70,-6" fill="none" stroke="#27AE60" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>

    <circle cx="120" cy="0" r="20" fill="none" stroke="#27AE60" stroke-width="2"/>
    <polyline points="112,0 117,6 130,-6" fill="none" stroke="#27AE60" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>
  </g>

  <!-- Version labels -->
  <rect x="680" y="130" width="80" height="40" rx="8" fill="#0D2B3E" stroke="#2980B9" stroke-width="1.5"/>
  <text x="720" y="156" text-anchor="middle" font-family="sans-serif" font-size="18" font-weight="700" fill="#2980B9">8.4</text>

  <path d="M720,170 L720,195" stroke="#E67E22" stroke-width="2" stroke-dasharray="4,3"/>
  <path d="M720,195 Q720,210 730,210 L770,210" stroke="#E67E22" stroke-width="2" stroke-dasharray="4,3"/>

  <rect x="770" y="195" width="80" height="30" rx="6" fill="#0D2B3E" stroke="#E67E22" stroke-width="1.5" opacity="0.6"/>
  <text x="810" y="215" text-anchor="middle" font-family="sans-serif" font-size="14" font-weight="600" fill="#E67E22" opacity="0.8">8.0</text>

  <!-- Safety net lines decorative -->
  <g opacity="0.15">
    <line x1="200" y1="480" x2="350" y2="500" stroke="#2980B9" stroke-width="1"/>
    <line x1="350" y1="500" x2="500" y2="480" stroke="#2980B9" stroke-width="1"/>
    <line x1="500" y1="480" x2="650" y2="500" stroke="#2980B9" stroke-width="1"/>
    <line x1="200" y1="490" x2="350" y2="510" stroke="#2980B9" stroke-width="1"/>
    <line x1="350" y1="510" x2="500" y2="490" stroke="#2980B9" stroke-width="1"/>
    <line x1="500" y1="490" x2="650" y2="510" stroke="#2980B9" stroke-width="1"/>
    <!-- Verticals -->
    <line x1="275" y1="480" x2="275" y2="510" stroke="#2980B9" stroke-width="1"/>
    <line x1="425" y1="480" x2="425" y2="510" stroke="#2980B9" stroke-width="1"/>
    <line x1="575" y1="480" x2="575" y2="510" stroke="#2980B9" stroke-width="1"/>
  </g>

  <!-- Part 4 badge -->
  <rect x="1000" y="30" width="150" height="50" rx="25" fill="url(#orange4)"/>
  <text x="1075" y="62" text-anchor="middle" font-family="sans-serif" font-size="22" font-weight="700" fill="white">Part 4</text>

  <!-- Title -->
  <text x="60" y="580" font-family="sans-serif" font-size="28" font-weight="700" fill="white" opacity="0.9">MySQL 8.0 to 8.4 Upgrade</text>
  <text x="60" y="610" font-family="sans-serif" font-size="18" fill="#2980B9" opacity="0.8">Rollback &amp; Validation</text>

  <!-- ReliaDB brand mark -->
  <rect x="1130" y="570" width="44" height="44" rx="10" fill="#1A5276" stroke="#2980B9" stroke-width="1"/>
  <text x="1152" y="601" text-anchor="middle" font-family="sans-serif" font-size="26" font-weight="800" fill="white">R</text>
</svg>