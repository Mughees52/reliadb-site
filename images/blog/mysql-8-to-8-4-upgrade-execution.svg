<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <linearGradient id="bg3" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0D2B3E"/>
      <stop offset="100%" stop-color="#1A5276"/>
    </linearGradient>
    <linearGradient id="orange3" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#E67E22"/>
      <stop offset="100%" stop-color="#D35400"/>
    </linearGradient>
    <linearGradient id="flame" x1="0%" y1="100%" x2="0%" y2="0%">
      <stop offset="0%" stop-color="#E67E22"/>
      <stop offset="50%" stop-color="#D35400"/>
      <stop offset="100%" stop-color="#E67E22" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="gear3" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#2980B9"/>
      <stop offset="100%" stop-color="#00758F"/>
    </linearGradient>
    <pattern id="grid3" width="60" height="60" patternUnits="userSpaceOnUse">
      <path d="M 60 0 L 0 0 0 60" fill="none" stroke="#1A5276" stroke-width="0.5" opacity="0.3"/>
    </pattern>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg3)"/>
  <rect width="1200" height="630" fill="url(#grid3)"/>

  <!-- Decorative -->
  <circle cx="600" cy="350" r="250" fill="#2980B9" opacity="0.03"/>

  <!-- Upgrade series band -->
  <rect x="0" y="0" width="1200" height="6" fill="url(#orange3)"/>

  <!-- Large gear (left) -->
  <g transform="translate(350, 300)">
    <circle cx="0" cy="0" r="100" fill="none" stroke="#2980B9" stroke-width="3" opacity="0.6"/>
    <circle cx="0" cy="0" r="75" fill="none" stroke="#2980B9" stroke-width="2" opacity="0.3"/>
    <circle cx="0" cy="0" r="30" fill="#0D2B3E" stroke="#2980B9" stroke-width="3" opacity="0.8"/>
    <!-- Gear teeth -->
    <rect x="-12" y="-115" width="24" height="30" rx="4" fill="#2980B9" opacity="0.6"/>
    <rect x="-12" y="85" width="24" height="30" rx="4" fill="#2980B9" opacity="0.6"/>
    <rect x="-115" y="-12" width="30" height="24" rx="4" fill="#2980B9" opacity="0.6"/>
    <rect x="85" y="-12" width="30" height="24" rx="4" fill="#2980B9" opacity="0.6"/>
    <!-- Diagonal teeth -->
    <rect x="55" y="-90" width="24" height="30" rx="4" fill="#2980B9" opacity="0.6" transform="rotate(45, 67, -75)"/>
    <rect x="-79" y="60" width="24" height="30" rx="4" fill="#2980B9" opacity="0.6" transform="rotate(45, -67, 75)"/>
    <rect x="-79" y="-90" width="24" height="30" rx="4" fill="#2980B9" opacity="0.6" transform="rotate(-45, -67, -75)"/>
    <rect x="55" y="60" width="24" height="30" rx="4" fill="#2980B9" opacity="0.6" transform="rotate(-45, 67, 75)"/>
  </g>

  <!-- Small gear (meshing) -->
  <g transform="translate(510, 200)">
    <circle cx="0" cy="0" r="55" fill="none" stroke="#00758F" stroke-width="2.5" opacity="0.6"/>
    <circle cx="0" cy="0" r="40" fill="none" stroke="#00758F" stroke-width="1.5" opacity="0.3"/>
    <circle cx="0" cy="0" r="18" fill="#0D2B3E" stroke="#00758F" stroke-width="2.5" opacity="0.8"/>
    <!-- Teeth -->
    <rect x="-10" y="-68" width="20" height="24" rx="3" fill="#00758F" opacity="0.6"/>
    <rect x="-10" y="44" width="20" height="24" rx="3" fill="#00758F" opacity="0.6"/>
    <rect x="-68" y="-10" width="24" height="20" rx="3" fill="#00758F" opacity="0.6"/>
    <rect x="44" y="-10" width="24" height="20" rx="3" fill="#00758F" opacity="0.6"/>
    <rect x="28" y="-54" width="20" height="24" rx="3" fill="#00758F" opacity="0.6" transform="rotate(45, 38, -42)"/>
    <rect x="-48" y="30" width="20" height="24" rx="3" fill="#00758F" opacity="0.6" transform="rotate(45, -38, 42)"/>
  </g>

  <!-- Rocket -->
  <g transform="translate(800, 280)">
    <!-- Rocket body -->
    <path d="M0,-120 Q-30,-80 -30,20 L-30,60 L30,60 L30,20 Q30,-80 0,-120 Z" fill="#0D2B3E" stroke="#E67E22" stroke-width="2.5"/>
    <!-- Nose cone highlight -->
    <path d="M0,-120 Q-15,-90 -20,-40 L20,-40 Q15,-90 0,-120 Z" fill="#E67E22" opacity="0.15"/>
    <!-- Window -->
    <circle cx="0" cy="-30" r="18" fill="#0D2B3E" stroke="#2980B9" stroke-width="2"/>
    <circle cx="0" cy="-30" r="12" fill="#2980B9" opacity="0.2"/>
    <!-- Fins -->
    <path d="M-30,30 L-55,70 L-30,60 Z" fill="#1A5276" stroke="#2980B9" stroke-width="1.5"/>
    <path d="M30,30 L55,70 L30,60 Z" fill="#1A5276" stroke="#2980B9" stroke-width="1.5"/>
    <!-- Flame -->
    <path d="M-20,60 Q-25,100 0,130 Q25,100 20,60 Z" fill="url(#flame)" opacity="0.8"/>
    <path d="M-10,60 Q-12,90 0,110 Q12,90 10,60 Z" fill="#E67E22" opacity="0.5"/>
    <!-- Version on body -->
    <text x="0" y="15" text-anchor="middle" font-family="sans-serif" font-size="20" font-weight="700" fill="#2980B9">8.4</text>
  </g>

  <!-- Speed lines -->
  <line x1="730" y1="380" x2="680" y2="420" stroke="#E67E22" stroke-width="2" opacity="0.3"/>
  <line x1="740" y1="400" x2="700" y2="430" stroke="#E67E22" stroke-width="1.5" opacity="0.2"/>
  <line x1="870" y1="380" x2="920" y2="420" stroke="#E67E22" stroke-width="2" opacity="0.3"/>
  <line x1="860" y1="400" x2="900" y2="430" stroke="#E67E22" stroke-width="1.5" opacity="0.2"/>

  <!-- Part 3 badge -->
  <rect x="1000" y="30" width="150" height="50" rx="25" fill="url(#orange3)"/>
  <text x="1075" y="62" text-anchor="middle" font-family="sans-serif" font-size="22" font-weight="700" fill="white">Part 3</text>

  <!-- Title -->
  <text x="60" y="580" font-family="sans-serif" font-size="28" font-weight="700" fill="white" opacity="0.9">MySQL 8.0 to 8.4 Upgrade</text>
  <text x="60" y="610" font-family="sans-serif" font-size="18" fill="#2980B9" opacity="0.8">Execution</text>

  <!-- ReliaDB brand mark -->
  <rect x="1130" y="570" width="44" height="44" rx="10" fill="#1A5276" stroke="#2980B9" stroke-width="1"/>
  <text x="1152" y="601" text-anchor="middle" font-family="sans-serif" font-size="26" font-weight="800" fill="white">R</text>
</svg>