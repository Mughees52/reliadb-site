<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <linearGradient id="bg1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0D2B3E"/>
      <stop offset="100%" stop-color="#1A5276"/>
    </linearGradient>
    <linearGradient id="accent1" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#2980B9"/>
      <stop offset="100%" stop-color="#1A5276"/>
    </linearGradient>
    <linearGradient id="arrow1" x1="0%" y1="100%" x2="0%" y2="0%">
      <stop offset="0%" stop-color="#00758F"/>
      <stop offset="100%" stop-color="#2980B9"/>
    </linearGradient>
    <linearGradient id="orange1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#E67E22"/>
      <stop offset="100%" stop-color="#D35400"/>
    </linearGradient>
    <!-- Grid pattern -->
    <pattern id="grid1" width="60" height="60" patternUnits="userSpaceOnUse">
      <path d="M 60 0 L 0 0 0 60" fill="none" stroke="#1A5276" stroke-width="0.5" opacity="0.3"/>
    </pattern>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg1)"/>
  <rect width="1200" height="630" fill="url(#grid1)"/>

  <!-- Decorative circles -->
  <circle cx="900" cy="100" r="200" fill="#2980B9" opacity="0.05"/>
  <circle cx="200" cy="500" r="150" fill="#00758F" opacity="0.05"/>

  <!-- Upgrade series consistent band at top -->
  <rect x="0" y="0" width="1200" height="6" fill="url(#orange1)"/>

  <!-- Clipboard body -->
  <rect x="160" y="140" width="280" height="360" rx="16" fill="#0D2B3E" stroke="#2980B9" stroke-width="2"/>
  <!-- Clipboard clip -->
  <rect x="250" y="122" width="100" height="36" rx="8" fill="#2980B9"/>
  <circle cx="300" cy="140" r="8" fill="#0D2B3E"/>

  <!-- Checklist items -->
  <!-- Item 1 - highlighted/checked -->
  <rect x="195" y="195" width="24" height="24" rx="4" fill="#E67E22"/>
  <polyline points="200,208 207,216 215,200" fill="none" stroke="white" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>
  <rect x="235" y="200" width="170" height="12" rx="6" fill="#2980B9" opacity="0.8"/>

  <!-- Item 2 -->
  <rect x="195" y="245" width="24" height="24" rx="4" fill="none" stroke="#2980B9" stroke-width="2" opacity="0.5"/>
  <rect x="235" y="250" width="140" height="12" rx="6" fill="#2980B9" opacity="0.3"/>

  <!-- Item 3 -->
  <rect x="195" y="295" width="24" height="24" rx="4" fill="none" stroke="#2980B9" stroke-width="2" opacity="0.5"/>
  <rect x="235" y="300" width="160" height="12" rx="6" fill="#2980B9" opacity="0.3"/>

  <!-- Item 4 -->
  <rect x="195" y="345" width="24" height="24" rx="4" fill="none" stroke="#2980B9" stroke-width="2" opacity="0.5"/>
  <rect x="235" y="350" width="120" height="12" rx="6" fill="#2980B9" opacity="0.3"/>

  <!-- Item 5 -->
  <rect x="195" y="395" width="24" height="24" rx="4" fill="none" stroke="#2980B9" stroke-width="2" opacity="0.5"/>
  <rect x="235" y="400" width="150" height="12" rx="6" fill="#2980B9" opacity="0.3"/>

  <!-- Database icon -->
  <g transform="translate(300, 180)">
    <ellipse cx="0" cy="0" rx="35" ry="12" fill="none" stroke="#00758F" stroke-width="2" opacity="0.4"/>
  </g>

  <!-- Arrow section: 8.0 to 8.4 -->
  <!-- Version boxes -->
  <rect x="560" y="360" width="140" height="80" rx="12" fill="#0D2B3E" stroke="#00758F" stroke-width="2"/>
  <text x="630" y="408" text-anchor="middle" font-family="sans-serif" font-size="32" font-weight="700" fill="#00758F">8.0</text>

  <rect x="560" y="180" width="140" height="80" rx="12" fill="#0D2B3E" stroke="#2980B9" stroke-width="2"/>
  <text x="630" y="228" text-anchor="middle" font-family="sans-serif" font-size="32" font-weight="700" fill="#2980B9">8.4</text>

  <!-- Upward arrow -->
  <line x1="630" y1="350" x2="630" y2="275" stroke="url(#arrow1)" stroke-width="4"/>
  <polygon points="615,280 630,260 645,280" fill="#2980B9"/>

  <!-- MySQL dolphin-inspired abstract shape -->
  <g transform="translate(820, 200)" opacity="0.15">
    <circle cx="0" cy="0" r="120" fill="#00758F"/>
    <circle cx="50" cy="-30" r="80" fill="#2980B9"/>
  </g>

  <!-- Database cylinder large decorative -->
  <g transform="translate(850, 260)">
    <rect x="-60" y="-20" width="120" height="120" rx="4" fill="none" stroke="#2980B9" stroke-width="2" opacity="0.6"/>
    <ellipse cx="0" cy="-20" rx="60" ry="18" fill="#0D2B3E" stroke="#2980B9" stroke-width="2" opacity="0.6"/>
    <ellipse cx="0" cy="100" rx="60" ry="18" fill="none" stroke="#2980B9" stroke-width="2" opacity="0.6"/>
    <!-- Data rows -->
    <line x1="-40" y1="15" x2="40" y2="15" stroke="#00758F" stroke-width="1.5" opacity="0.4"/>
    <line x1="-40" y1="35" x2="40" y2="35" stroke="#00758F" stroke-width="1.5" opacity="0.4"/>
    <line x1="-40" y1="55" x2="40" y2="55" stroke="#00758F" stroke-width="1.5" opacity="0.4"/>
    <line x1="-40" y1="75" x2="40" y2="75" stroke="#00758F" stroke-width="1.5" opacity="0.4"/>
  </g>

  <!-- Part 1 badge -->
  <rect x="1000" y="30" width="150" height="50" rx="25" fill="url(#orange1)"/>
  <text x="1075" y="62" text-anchor="middle" font-family="sans-serif" font-size="22" font-weight="700" fill="white">Part 1</text>

  <!-- Title area -->
  <text x="60" y="580" font-family="sans-serif" font-size="28" font-weight="700" fill="white" opacity="0.9">MySQL 8.0 to 8.4 Upgrade</text>
  <text x="60" y="610" font-family="sans-serif" font-size="18" fill="#2980B9" opacity="0.8">Pre-Upgrade Preparation</text>

  <!-- ReliaDB brand mark bottom-right -->
  <rect x="1130" y="570" width="44" height="44" rx="10" fill="#1A5276" stroke="#2980B9" stroke-width="1"/>
  <text x="1152" y="601" text-anchor="middle" font-family="sans-serif" font-size="26" font-weight="800" fill="white">R</text>
</svg>