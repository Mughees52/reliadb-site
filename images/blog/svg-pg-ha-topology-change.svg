<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 920 520">
  <defs>
    <filter id="shadow4" x="-4%" y="-4%" width="108%" height="108%">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-color="#000" flood-opacity="0.3"/>
    </filter>
    <marker id="arrWal" markerWidth="10" markerHeight="7" refX="5" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#27ae60"/>
    </marker>
    <marker id="arrWal2" markerWidth="10" markerHeight="7" refX="5" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#27ae60"/>
    </marker>
    <marker id="arrFailover" markerWidth="12" markerHeight="8" refX="6" refY="4" orient="auto">
      <polygon points="0 0, 12 4, 0 8" fill="#E67E22"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="920" height="520" rx="12" fill="#1a1a2e"/>

  <!-- Title -->
  <text x="460" y="40" text-anchor="middle" fill="#ffffff" font-family="Inter, sans-serif" font-size="22" font-weight="700">Topology Before &amp; After Failover</text>
  <line x1="280" y1="52" x2="640" y2="52" stroke="#E67E22" stroke-width="2"/>

  <!-- ========== LEFT: Before ========== -->
  <rect x="20" y="70" width="410" height="40" rx="8" fill="#2980B9" opacity="0.12"/>
  <text x="225" y="96" text-anchor="middle" fill="#2980B9" font-family="Inter, sans-serif" font-size="16" font-weight="700">Before Failover</text>

  <!-- Primary: pg-primary -->
  <rect x="115" y="130" width="220" height="80" rx="12" fill="#16213e" stroke="#27ae60" stroke-width="3" filter="url(#shadow4)"/>
  <rect x="125" y="138" width="70" height="22" rx="6" fill="#27ae60" opacity="0.25" stroke="#27ae60" stroke-width="1"/>
  <text x="160" y="153" text-anchor="middle" fill="#27ae60" font-family="Inter, sans-serif" font-size="11" font-weight="700">PRIMARY</text>
  <text x="225" y="172" text-anchor="middle" fill="#ffffff" font-family="Inter, sans-serif" font-size="15" font-weight="700">pg-primary</text>
  <text x="225" y="195" text-anchor="middle" fill="#aaaacc" font-family="Inter, sans-serif" font-size="12">192.168.2.6</text>

  <!-- WAL arrows down -->
  <line x1="175" y1="210" x2="120" y2="280" stroke="#27ae60" stroke-width="2" marker-end="url(#arrWal)"/>
  <line x1="275" y1="210" x2="330" y2="280" stroke="#27ae60" stroke-width="2" marker-end="url(#arrWal)"/>

  <!-- WAL label -->
  <text x="105" y="250" fill="#27ae60" font-family="Inter, sans-serif" font-size="10" font-weight="600" transform="rotate(-30, 105, 250)">WAL stream</text>
  <text x="335" y="250" fill="#27ae60" font-family="Inter, sans-serif" font-size="10" font-weight="600" transform="rotate(30, 335, 250)">WAL stream</text>

  <!-- Replica 1 -->
  <rect x="25" y="285" width="195" height="75" rx="12" fill="#16213e" stroke="#2980B9" stroke-width="2.5" filter="url(#shadow4)"/>
  <rect x="35" y="293" width="66" height="22" rx="6" fill="#2980B9" opacity="0.25" stroke="#2980B9" stroke-width="1"/>
  <text x="68" y="308" text-anchor="middle" fill="#2980B9" font-family="Inter, sans-serif" font-size="11" font-weight="700">REPLICA</text>
  <text x="122" y="328" text-anchor="middle" fill="#ffffff" font-family="Inter, sans-serif" font-size="14" font-weight="600">pg-replica1</text>
  <text x="122" y="348" text-anchor="middle" fill="#aaaacc" font-family="Inter, sans-serif" font-size="11">192.168.2.7</text>

  <!-- Replica 2 -->
  <rect x="235" y="285" width="195" height="75" rx="12" fill="#16213e" stroke="#2980B9" stroke-width="2.5" filter="url(#shadow4)"/>
  <rect x="245" y="293" width="66" height="22" rx="6" fill="#2980B9" opacity="0.25" stroke="#2980B9" stroke-width="1"/>
  <text x="278" y="308" text-anchor="middle" fill="#2980B9" font-family="Inter, sans-serif" font-size="11" font-weight="700">REPLICA</text>
  <text x="332" y="328" text-anchor="middle" fill="#ffffff" font-family="Inter, sans-serif" font-size="14" font-weight="600">pg-replica2</text>
  <text x="332" y="348" text-anchor="middle" fill="#aaaacc" font-family="Inter, sans-serif" font-size="11">192.168.2.8</text>

  <!-- ========== Big Failover Arrow ========== -->
  <line x1="445" y1="240" x2="490" y2="240" stroke="#E67E22" stroke-width="4" marker-end="url(#arrFailover)"/>
  <rect x="440" y="205" width="100" height="28" rx="8" fill="#E67E22" opacity="0.2" stroke="#E67E22" stroke-width="1.5"/>
  <text x="490" y="224" text-anchor="middle" fill="#E67E22" font-family="Inter, sans-serif" font-size="13" font-weight="700">Failover</text>

  <!-- ========== RIGHT: After ========== -->
  <rect x="490" y="70" width="410" height="40" rx="8" fill="#E67E22" opacity="0.12"/>
  <text x="695" y="96" text-anchor="middle" fill="#E67E22" font-family="Inter, sans-serif" font-size="16" font-weight="700">After Failover</text>

  <!-- NEW Primary: pg-replica1 (promoted) -->
  <rect x="585" y="130" width="220" height="90" rx="12" fill="#16213e" stroke="#27ae60" stroke-width="3" filter="url(#shadow4)"/>
  <rect x="595" y="138" width="70" height="22" rx="6" fill="#27ae60" opacity="0.25" stroke="#27ae60" stroke-width="1"/>
  <text x="630" y="153" text-anchor="middle" fill="#27ae60" font-family="Inter, sans-serif" font-size="11" font-weight="700">PRIMARY</text>

  <!-- Promoted badge -->
  <rect x="718" y="136" width="78" height="24" rx="12" fill="#E67E22" filter="url(#shadow4)"/>
  <text x="730" y="152" fill="#ffffff" font-family="Inter, sans-serif" font-size="11" font-weight="700">&#9733; Promoted</text>

  <text x="695" y="177" text-anchor="middle" fill="#ffffff" font-family="Inter, sans-serif" font-size="15" font-weight="700">pg-replica1</text>
  <text x="695" y="200" text-anchor="middle" fill="#aaaacc" font-family="Inter, sans-serif" font-size="12">192.168.2.7</text>

  <!-- WAL arrows down from new primary -->
  <line x1="645" y1="220" x2="590" y2="290" stroke="#27ae60" stroke-width="2" marker-end="url(#arrWal2)"/>
  <line x1="745" y1="220" x2="800" y2="290" stroke="#27ae60" stroke-width="2" marker-end="url(#arrWal2)"/>

  <!-- WAL labels -->
  <text x="575" y="260" fill="#27ae60" font-family="Inter, sans-serif" font-size="10" font-weight="600" transform="rotate(-30, 575, 260)">WAL stream</text>
  <text x="805" y="260" fill="#27ae60" font-family="Inter, sans-serif" font-size="10" font-weight="600" transform="rotate(30, 805, 260)">WAL stream</text>

  <!-- Demoted: pg-primary -->
  <rect x="495" y="295" width="195" height="80" rx="12" fill="#16213e" stroke="#2980B9" stroke-width="2.5" filter="url(#shadow4)"/>
  <rect x="505" y="303" width="66" height="22" rx="6" fill="#2980B9" opacity="0.25" stroke="#2980B9" stroke-width="1"/>
  <text x="538" y="318" text-anchor="middle" fill="#2980B9" font-family="Inter, sans-serif" font-size="11" font-weight="700">REPLICA</text>
  <text x="592" y="340" text-anchor="middle" fill="#ffffff" font-family="Inter, sans-serif" font-size="14" font-weight="600">pg-primary</text>
  <text x="592" y="358" text-anchor="middle" fill="#aaaacc" font-family="Inter, sans-serif" font-size="11">192.168.2.6</text>
  <text x="592" y="373" text-anchor="middle" fill="#E67E22" font-family="Inter, sans-serif" font-size="10" font-weight="600" font-style="italic">Demoted to replica</text>

  <!-- Still Replica: pg-replica2 -->
  <rect x="705" y="295" width="195" height="75" rx="12" fill="#16213e" stroke="#2980B9" stroke-width="2.5" filter="url(#shadow4)"/>
  <rect x="715" y="303" width="66" height="22" rx="6" fill="#2980B9" opacity="0.25" stroke="#2980B9" stroke-width="1"/>
  <text x="748" y="318" text-anchor="middle" fill="#2980B9" font-family="Inter, sans-serif" font-size="11" font-weight="700">REPLICA</text>
  <text x="802" y="340" text-anchor="middle" fill="#ffffff" font-family="Inter, sans-serif" font-size="14" font-weight="600">pg-replica2</text>
  <text x="802" y="358" text-anchor="middle" fill="#aaaacc" font-family="Inter, sans-serif" font-size="11">192.168.2.8</text>

  <!-- Legend -->
  <rect x="100" y="420" width="720" height="80" rx="10" fill="#16213e" opacity="0.4"/>
  <text x="460" y="445" text-anchor="middle" fill="#ffffff" font-family="Inter, sans-serif" font-size="13" font-weight="600">Key Changes</text>
  <circle cx="180" cy="468" r="6" fill="#27ae60"/>
  <text x="195" y="472" fill="#aaaacc" font-family="Inter, sans-serif" font-size="11">Primary (accepts writes)</text>
  <circle cx="380" cy="468" r="6" fill="#2980B9"/>
  <text x="395" y="472" fill="#aaaacc" font-family="Inter, sans-serif" font-size="11">Replica (read-only)</text>
  <line x1="540" y1="468" x2="570" y2="468" stroke="#27ae60" stroke-width="2"/>
  <text x="578" y="472" fill="#aaaacc" font-family="Inter, sans-serif" font-size="11">WAL streaming</text>
  <text x="460" y="492" text-anchor="middle" fill="#E67E22" font-family="Inter, sans-serif" font-size="11" font-weight="600">ProxySQL automatically updates hostgroups -- HG 10 now points to pg-replica1</text>
</svg>