<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <linearGradient id="bg7" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0A1F2E"/>
      <stop offset="100%" stop-color="#1A5276"/>
    </linearGradient>
    <linearGradient id="browserBar" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#1A5276"/>
      <stop offset="100%" stop-color="#0D2B3E"/>
    </linearGradient>
    <filter id="glow7">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg7)"/>

  <!-- Ambient glow -->
  <circle cx="600" cy="320" r="350" fill="#2980B9" opacity="0.04"/>
  <circle cx="600" cy="320" r="200" fill="#2980B9" opacity="0.03"/>

  <!-- Browser window frame -->
  <g transform="translate(140, 50)">
    <!-- Browser chrome -->
    <rect x="0" y="0" width="920" height="480" rx="12" fill="#0A1929" stroke="#2980B9" stroke-width="1.5"/>
    <!-- Title bar -->
    <rect x="0" y="0" width="920" height="40" rx="12" fill="url(#browserBar)"/>
    <rect x="0" y="28" width="920" height="12" fill="url(#browserBar)"/>
    <!-- Traffic lights -->
    <circle cx="24" cy="20" r="6" fill="#E74C3C" opacity="0.7"/>
    <circle cx="46" cy="20" r="6" fill="#E67E22" opacity="0.7"/>
    <circle cx="68" cy="20" r="6" fill="#27AE60" opacity="0.7"/>
    <!-- URL bar -->
    <rect x="100" y="10" width="500" height="22" rx="4" fill="#0D2B3E"/>
    <text x="115" y="25" font-family="sans-serif" font-size="11" fill="#2980B9" opacity="0.6">reliadb.com/tools/explain/</text>

    <!-- Content area -->
    <!-- Sidebar mock -->
    <rect x="15" y="55" width="180" height="410" rx="6" fill="#0D2B3E" opacity="0.5"/>
    <!-- Sidebar tabs -->
    <rect x="25" y="65" width="70" height="22" rx="4" fill="#E67E22" opacity="0.6"/>
    <rect x="100" y="65" width="45" height="22" rx="4" fill="#1A5276"/>
    <rect x="150" y="65" width="35" height="22" rx="4" fill="#1A5276"/>

    <!-- Issue items in sidebar -->
    <rect x="25" y="100" width="160" height="20" rx="3" fill="#E74C3C" opacity="0.15"/>
    <circle cx="35" cy="110" r="4" fill="#E74C3C" opacity="0.6"/>
    <rect x="45" y="106" width="100" height="8" rx="4" fill="#E74C3C" opacity="0.2"/>

    <rect x="25" y="128" width="160" height="20" rx="3" fill="#E67E22" opacity="0.15"/>
    <circle cx="35" cy="138" r="4" fill="#E67E22" opacity="0.6"/>
    <rect x="45" y="134" width="90" height="8" rx="4" fill="#E67E22" opacity="0.2"/>

    <rect x="25" y="156" width="160" height="20" rx="3" fill="#27AE60" opacity="0.15"/>
    <circle cx="35" cy="166" r="4" fill="#27AE60" opacity="0.6"/>
    <rect x="45" y="162" width="110" height="8" rx="4" fill="#27AE60" opacity="0.2"/>

    <rect x="25" y="184" width="160" height="20" rx="3" fill="#E67E22" opacity="0.15"/>
    <circle cx="35" cy="194" r="4" fill="#E67E22" opacity="0.6"/>
    <rect x="45" y="190" width="80" height="8" rx="4" fill="#E67E22" opacity="0.2"/>

    <!-- Tree visualization area -->
    <rect x="210" y="55" width="695" height="410" rx="6" fill="#0D2B3E" opacity="0.3"/>

    <!-- Tree nodes -->
    <!-- Root -->
    <rect x="450" y="70" width="130" height="36" rx="6" fill="#0D2B3E" stroke="#2980B9" stroke-width="2"/>
    <circle cx="468" cy="88" r="5" fill="#2980B9"/>
    <rect x="480" y="84" width="75" height="8" rx="4" fill="#2980B9" opacity="0.5"/>
    <!-- Badge -->
    <rect x="558" y="78" width="16" height="14" rx="3" fill="#2980B9" opacity="0.6"/>

    <!-- Edges -->
    <line x1="490" y1="106" x2="380" y2="150" stroke="#27AE60" stroke-width="3" opacity="0.5"/>
    <line x1="540" y1="106" x2="620" y2="150" stroke="#E67E22" stroke-width="7" opacity="0.5"/>

    <!-- Left child -->
    <rect x="310" y="155" width="120" height="34" rx="6" fill="#0D2B3E" stroke="#27AE60" stroke-width="2"/>
    <circle cx="326" cy="172" r="5" fill="#27AE60"/>
    <rect x="338" y="168" width="65" height="8" rx="4" fill="#27AE60" opacity="0.4"/>

    <!-- Right child (highlighted bottleneck) -->
    <rect x="560" y="155" width="130" height="34" rx="6" fill="#0D2B3E" stroke="#E67E22" stroke-width="2.5" filter="url(#glow7)"/>
    <circle cx="578" cy="172" r="5" fill="#E67E22"/>
    <rect x="590" y="168" width="75" height="8" rx="4" fill="#E67E22" opacity="0.5"/>
    <rect x="668" y="163" width="16" height="14" rx="3" fill="#E67E22" opacity="0.7"/>

    <!-- Right subtree edges -->
    <line x1="600" y1="189" x2="530" y2="240" stroke="#2980B9" stroke-width="2" opacity="0.4"/>
    <line x1="650" y1="189" x2="720" y2="240" stroke="#E74C3C" stroke-width="9" opacity="0.4"/>

    <!-- Right-left grandchild -->
    <rect x="470" y="245" width="110" height="30" rx="5" fill="#0D2B3E" stroke="#2980B9" stroke-width="1.5"/>
    <circle cx="486" cy="260" r="4" fill="#2980B9"/>
    <rect x="496" y="256" width="55" height="7" rx="3" fill="#2980B9" opacity="0.3"/>

    <!-- Right-right grandchild (critical) -->
    <rect x="665" y="245" width="120" height="30" rx="5" fill="#0D2B3E" stroke="#E74C3C" stroke-width="2" filter="url(#glow7)"/>
    <circle cx="681" cy="260" r="4" fill="#E74C3C"/>
    <rect x="691" y="256" width="65" height="7" rx="3" fill="#E74C3C" opacity="0.4"/>
    <rect x="763" y="251" width="16" height="14" rx="3" fill="#E74C3C" opacity="0.7"/>

    <!-- Left child's children -->
    <line x1="345" y1="189" x2="290" y2="240" stroke="#27AE60" stroke-width="1.5" opacity="0.3"/>
    <line x1="390" y1="189" x2="430" y2="240" stroke="#2980B9" stroke-width="3" opacity="0.3"/>

    <rect x="240" y="245" width="95" height="28" rx="5" fill="#0D2B3E" stroke="#27AE60" stroke-width="1.5"/>
    <circle cx="254" cy="259" r="4" fill="#27AE60"/>
    <rect x="264" y="255" width="45" height="7" rx="3" fill="#27AE60" opacity="0.3"/>

    <rect x="395" y="245" width="95" height="28" rx="5" fill="#0D2B3E" stroke="#2980B9" stroke-width="1.5"/>
    <circle cx="409" cy="259" r="4" fill="#2980B9"/>
    <rect x="419" y="255" width="50" height="7" rx="3" fill="#2980B9" opacity="0.3"/>

    <!-- Stats bar at bottom -->
    <rect x="210" y="440" width="695" height="25" rx="0 0 6 6" fill="#0D2B3E" opacity="0.6"/>
    <rect x="220" y="448" width="60" height="10" rx="3" fill="#00758F" opacity="0.4"/>
    <rect x="290" y="448" width="40" height="10" rx="3" fill="#2980B9" opacity="0.3"/>
    <rect x="340" y="448" width="50" height="10" rx="3" fill="#E67E22" opacity="0.3"/>
    <circle cx="410" cy="453" r="4" fill="#27AE60" opacity="0.5"/>
    <rect x="420" y="448" width="30" height="10" rx="3" fill="#27AE60" opacity="0.3"/>
  </g>

  <!-- ReliaDB logo mark (more prominent for tool announcement) -->
  <g transform="translate(60, 50)">
    <rect x="0" y="0" width="50" height="50" rx="12" fill="#1A5276" stroke="#2980B9" stroke-width="2"/>
    <text x="25" y="37" text-anchor="middle" font-family="sans-serif" font-size="30" font-weight="800" fill="white">R</text>
  </g>

  <!-- Title -->
  <text x="60" y="580" font-family="sans-serif" font-size="28" font-weight="700" fill="white" opacity="0.9">MySQL EXPLAIN Analyzer</text>
  <text x="60" y="610" font-family="sans-serif" font-size="18" fill="#2980B9" opacity="0.8">Free Query Plan Visualizer</text>

  <!-- ReliaDB brand mark bottom-right -->
  <rect x="1130" y="570" width="44" height="44" rx="10" fill="#1A5276" stroke="#2980B9" stroke-width="1"/>
  <text x="1152" y="601" text-anchor="middle" font-family="sans-serif" font-size="26" font-weight="800" fill="white">R</text>
</svg>