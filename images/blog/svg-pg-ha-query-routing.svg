<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 700">
  <defs>
    <filter id="shadow2" x="-4%" y="-4%" width="108%" height="108%">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-color="#000" flood-opacity="0.3"/>
    </filter>
    <marker id="arrBlue" markerWidth="10" markerHeight="7" refX="5" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#2980B9"/>
    </marker>
    <marker id="arrOrange" markerWidth="10" markerHeight="7" refX="5" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#E67E22"/>
    </marker>
    <marker id="arrGray" markerWidth="10" markerHeight="7" refX="5" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#888"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="900" height="700" rx="12" fill="#1a1a2e"/>

  <!-- Title -->
  <text x="450" y="40" text-anchor="middle" fill="#ffffff" font-family="Inter, sans-serif" font-size="22" font-weight="700">ProxySQL Query Routing</text>
  <line x1="310" y1="52" x2="590" y2="52" stroke="#E67E22" stroke-width="2"/>

  <!-- Start: Query Arrives -->
  <rect x="325" y="75" width="250" height="50" rx="25" fill="#2980B9" filter="url(#shadow2)"/>
  <text x="450" y="105" text-anchor="middle" fill="#ffffff" font-family="Inter, sans-serif" font-size="14" font-weight="700">Query Arrives (port 6133)</text>

  <!-- Arrow down -->
  <line x1="450" y1="125" x2="450" y2="160" stroke="#888" stroke-width="2" marker-end="url(#arrGray)"/>

  <!-- Diamond 1: SELECT ... FOR UPDATE? -->
  <polygon points="450,165 580,220 450,275 320,220" fill="#16213e" stroke="#E67E22" stroke-width="2" filter="url(#shadow2)"/>
  <text x="450" y="215" text-anchor="middle" fill="#ffffff" font-family="Inter, sans-serif" font-size="12" font-weight="600">SELECT ... FOR</text>
  <text x="450" y="232" text-anchor="middle" fill="#ffffff" font-family="Inter, sans-serif" font-size="12" font-weight="600">UPDATE?</text>

  <!-- Rule 100 label -->
  <rect x="585" y="197" width="70" height="22" rx="6" fill="#E67E22" opacity="0.2" stroke="#E67E22" stroke-width="1"/>
  <text x="620" y="212" text-anchor="middle" fill="#E67E22" font-family="Inter, sans-serif" font-size="11" font-weight="700">Rule 100</text>

  <!-- YES arrow right to Writer HG10 -->
  <line x1="580" y1="220" x2="660" y2="220" stroke="#E67E22" stroke-width="2.5" marker-end="url(#arrOrange)"/>
  <text x="620" y="240" text-anchor="middle" fill="#E67E22" font-family="Inter, sans-serif" font-size="12" font-weight="700">YES</text>

  <!-- Writer HG10 box (right side, for FOR UPDATE) -->
  <rect x="665" y="195" width="195" height="50" rx="10" fill="#16213e" stroke="#E67E22" stroke-width="2.5" filter="url(#shadow2)"/>
  <text x="762" y="216" text-anchor="middle" fill="#E67E22" font-family="Inter, sans-serif" font-size="13" font-weight="700">Hostgroup 10</text>
  <text x="762" y="236" text-anchor="middle" fill="#aaaacc" font-family="Inter, sans-serif" font-size="11">Writer</text>

  <!-- Arrow from HG10 to pg-primary (FOR UPDATE path) -->
  <line x1="762" y1="245" x2="762" y2="290" stroke="#E67E22" stroke-width="2" marker-end="url(#arrOrange)"/>
  <rect x="685" y="295" width="155" height="42" rx="8" fill="#16213e" stroke="#E67E22" stroke-width="2" filter="url(#shadow2)"/>
  <text x="762" y="321" text-anchor="middle" fill="#ffffff" font-family="Inter, sans-serif" font-size="13" font-weight="600">pg-primary</text>

  <!-- NO arrow down from Diamond 1 -->
  <line x1="450" y1="275" x2="450" y2="320" stroke="#888" stroke-width="2" marker-end="url(#arrGray)"/>
  <text x="435" y="300" text-anchor="end" fill="#aaaacc" font-family="Inter, sans-serif" font-size="12" font-weight="700">NO</text>

  <!-- Diamond 2: SELECT? -->
  <polygon points="450,325 560,375 450,425 340,375" fill="#16213e" stroke="#2980B9" stroke-width="2" filter="url(#shadow2)"/>
  <text x="450" y="380" text-anchor="middle" fill="#ffffff" font-family="Inter, sans-serif" font-size="14" font-weight="600">SELECT?</text>

  <!-- Rule 200 label -->
  <rect x="565" y="352" width="70" height="22" rx="6" fill="#2980B9" opacity="0.2" stroke="#2980B9" stroke-width="1"/>
  <text x="600" y="367" text-anchor="middle" fill="#2980B9" font-family="Inter, sans-serif" font-size="11" font-weight="700">Rule 200</text>

  <!-- YES arrow right to Reader HG20 -->
  <line x1="560" y1="375" x2="640" y2="375" stroke="#2980B9" stroke-width="2.5" marker-end="url(#arrBlue)"/>
  <text x="600" y="395" text-anchor="middle" fill="#2980B9" font-family="Inter, sans-serif" font-size="12" font-weight="700">YES</text>

  <!-- Reader HG20 box -->
  <rect x="645" y="350" width="210" height="50" rx="10" fill="#16213e" stroke="#2980B9" stroke-width="2.5" filter="url(#shadow2)"/>
  <text x="750" y="371" text-anchor="middle" fill="#2980B9" font-family="Inter, sans-serif" font-size="13" font-weight="700">Hostgroup 20</text>
  <text x="750" y="391" text-anchor="middle" fill="#aaaacc" font-family="Inter, sans-serif" font-size="11">Readers (round-robin)</text>

  <!-- Split to replicas -->
  <line x1="700" y1="400" x2="680" y2="455" stroke="#2980B9" stroke-width="2" marker-end="url(#arrBlue)"/>
  <line x1="800" y1="400" x2="820" y2="455" stroke="#2980B9" stroke-width="2" marker-end="url(#arrBlue)"/>

  <!-- pg-replica1 -->
  <rect x="600" y="460" width="155" height="42" rx="8" fill="#16213e" stroke="#2980B9" stroke-width="2" filter="url(#shadow2)"/>
  <text x="677" y="486" text-anchor="middle" fill="#ffffff" font-family="Inter, sans-serif" font-size="13" font-weight="600">pg-replica1</text>

  <!-- pg-replica2 -->
  <rect x="775" y="460" width="155" height="42" rx="8" fill="#16213e" stroke="#2980B9" stroke-width="2" filter="url(#shadow2)"/>
  <text x="852" y="486" text-anchor="middle" fill="#ffffff" font-family="Inter, sans-serif" font-size="13" font-weight="600">pg-replica2</text>

  <!-- NO arrow down from Diamond 2 -->
  <line x1="450" y1="425" x2="450" y2="470" stroke="#888" stroke-width="2" marker-end="url(#arrGray)"/>
  <text x="435" y="450" text-anchor="end" fill="#aaaacc" font-family="Inter, sans-serif" font-size="12" font-weight="700">NO</text>

  <!-- Default path label -->
  <rect x="375" y="440" width="65" height="22" rx="6" fill="#888" opacity="0.2" stroke="#888" stroke-width="1"/>
  <text x="407" y="455" text-anchor="middle" fill="#aaaacc" font-family="Inter, sans-serif" font-size="11" font-weight="700">Default</text>

  <!-- Default Writer HG10 -->
  <rect x="325" y="475" width="250" height="55" rx="10" fill="#16213e" stroke="#E67E22" stroke-width="2.5" filter="url(#shadow2)"/>
  <text x="450" y="498" text-anchor="middle" fill="#E67E22" font-family="Inter, sans-serif" font-size="13" font-weight="700">Default Hostgroup 10</text>
  <text x="450" y="518" text-anchor="middle" fill="#aaaacc" font-family="Inter, sans-serif" font-size="11">INSERT / UPDATE / DELETE / DDL</text>

  <!-- Arrow to pg-primary (default) -->
  <line x1="450" y1="530" x2="450" y2="570" stroke="#E67E22" stroke-width="2" marker-end="url(#arrOrange)"/>

  <!-- pg-primary (default path) -->
  <rect x="370" y="575" width="160" height="42" rx="8" fill="#16213e" stroke="#E67E22" stroke-width="2" filter="url(#shadow2)"/>
  <text x="450" y="601" text-anchor="middle" fill="#ffffff" font-family="Inter, sans-serif" font-size="13" font-weight="600">pg-primary</text>

  <!-- Legend -->
  <rect x="100" y="645" width="700" height="35" rx="6" fill="#16213e" opacity="0.5"/>
  <line x1="130" y1="663" x2="170" y2="663" stroke="#E67E22" stroke-width="2.5"/>
  <text x="178" y="667" fill="#aaaacc" font-family="Inter, sans-serif" font-size="11">Write path (HG 10)</text>
  <line x1="320" y1="663" x2="360" y2="663" stroke="#2980B9" stroke-width="2.5"/>
  <text x="368" y="667" fill="#aaaacc" font-family="Inter, sans-serif" font-size="11">Read path (HG 20)</text>
  <line x1="510" y1="663" x2="550" y2="663" stroke="#888" stroke-width="2"/>
  <text x="558" y="667" fill="#aaaacc" font-family="Inter, sans-serif" font-size="11">Decision flow</text>
</svg>