<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <linearGradient id="bg2" x1="0" y1="0" x2="0.5" y2="1">
      <stop offset="0%" stop-color="#0f2137"/>
      <stop offset="50%" stop-color="#1A5276"/>
      <stop offset="100%" stop-color="#142d44"/>
    </linearGradient>
    <linearGradient id="gaugeGrad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#e74c3c"/>
      <stop offset="35%" stop-color="#f39c12"/>
      <stop offset="65%" stop-color="#f1c40f"/>
      <stop offset="100%" stop-color="#2ecc71"/>
    </linearGradient>
    <linearGradient id="needleGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#E67E22"/>
      <stop offset="100%" stop-color="#d35400"/>
    </linearGradient>
    <linearGradient id="dbGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#2a5a7a"/>
      <stop offset="100%" stop-color="#1a3a5c"/>
    </linearGradient>
    <filter id="glow2">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="shadow2">
      <feDropShadow dx="0" dy="3" stdDeviation="6" flood-opacity="0.4"/>
    </filter>
    <clipPath id="gaugeClip">
      <rect x="200" y="100" width="800" height="350"/>
    </clipPath>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg2)"/>

  <!-- Subtle radial glow behind gauge -->
  <circle cx="600" cy="380" r="300" fill="#2980B9" opacity="0.06"/>
  <circle cx="600" cy="380" r="200" fill="#2980B9" opacity="0.04"/>

  <!-- Main speedometer gauge -->
  <g transform="translate(600, 380)" filter="url(#shadow2)">
    <!-- Gauge background arc -->
    <path d="M-220,0 A220,220 0 0,1 220,0" fill="none" stroke="#1a3050" stroke-width="50" stroke-linecap="round"/>

    <!-- Gauge colored arc (red to green) -->
    <path d="M-220,0 A220,220 0 0,1 220,0" fill="none" stroke="url(#gaugeGrad)" stroke-width="40" stroke-linecap="round" opacity="0.9"/>

    <!-- Gauge tick marks -->
    <g stroke="#fff" stroke-width="2" opacity="0.6">
      <line x1="-220" y1="0" x2="-195" y2="0" transform="rotate(0)"/>
      <line x1="-220" y1="0" x2="-200" y2="0" transform="rotate(-15)"/>
      <line x1="-220" y1="0" x2="-195" y2="0" transform="rotate(-30)"/>
      <line x1="-220" y1="0" x2="-200" y2="0" transform="rotate(-45)"/>
      <line x1="-220" y1="0" x2="-195" y2="0" transform="rotate(-60)"/>
      <line x1="-220" y1="0" x2="-200" y2="0" transform="rotate(-75)"/>
      <line x1="-220" y1="0" x2="-195" y2="0" transform="rotate(-90)"/>
      <line x1="-220" y1="0" x2="-200" y2="0" transform="rotate(-105)"/>
      <line x1="-220" y1="0" x2="-195" y2="0" transform="rotate(-120)"/>
      <line x1="-220" y1="0" x2="-200" y2="0" transform="rotate(-135)"/>
      <line x1="-220" y1="0" x2="-195" y2="0" transform="rotate(-150)"/>
      <line x1="-220" y1="0" x2="-200" y2="0" transform="rotate(-165)"/>
      <line x1="-220" y1="0" x2="-195" y2="0" transform="rotate(-180)"/>
    </g>

    <!-- Speed labels -->
    <text x="-235" y="25" font-family="sans-serif" font-size="14" fill="#e74c3c" font-weight="600">SLOW</text>
    <text x="195" y="25" font-family="sans-serif" font-size="14" fill="#2ecc71" font-weight="600">FAST</text>

    <!-- Needle pointing to slow zone (~30 degrees from left) -->
    <g transform="rotate(-145)" filter="url(#glow2)">
      <polygon points="0,-8 180,0 0,8" fill="url(#needleGrad)"/>
      <circle cx="0" cy="0" r="14" fill="#E67E22"/>
      <circle cx="0" cy="0" r="8" fill="#d35400"/>
    </g>

    <!-- Inner gauge ring -->
    <circle cx="0" cy="0" r="160" fill="none" stroke="#2a5a7a" stroke-width="1" opacity="0.5"/>
  </g>

  <!-- Database cylinder (right side) -->
  <g transform="translate(950, 300)" filter="url(#shadow2)">
    <ellipse cx="0" cy="0" rx="55" ry="16" fill="url(#dbGrad)" stroke="#4a8ab5" stroke-width="1.5"/>
    <rect x="-55" y="0" width="110" height="120" fill="url(#dbGrad)"/>
    <ellipse cx="0" cy="120" rx="55" ry="16" fill="url(#dbGrad)" stroke="#4a8ab5" stroke-width="1.5"/>
    <line x1="-55" y1="0" x2="-55" y2="120" stroke="#4a8ab5" stroke-width="1.5"/>
    <line x1="55" y1="0" x2="55" y2="120" stroke="#4a8ab5" stroke-width="1.5"/>
    <ellipse cx="0" cy="0" rx="55" ry="16" fill="#3a7a9a" stroke="#4a8ab5" stroke-width="1.5"/>
    <ellipse cx="0" cy="40" rx="55" ry="12" fill="none" stroke="#4a8ab5" stroke-width="0.8" opacity="0.3"/>
    <ellipse cx="0" cy="80" rx="55" ry="12" fill="none" stroke="#4a8ab5" stroke-width="0.8" opacity="0.3"/>
  </g>

  <!-- Diagnostic probe lines from gauge to DB -->
  <g stroke="#E67E22" stroke-width="1.5" opacity="0.5">
    <line x1="820" y1="330" x2="895" y2="320" stroke-dasharray="4,3"/>
    <line x1="820" y1="360" x2="895" y2="360" stroke-dasharray="4,3"/>
    <line x1="820" y1="390" x2="895" y2="400" stroke-dasharray="4,3"/>
    <!-- Probe dots at endpoints -->
    <circle cx="820" cy="330" r="3" fill="#E67E22" opacity="0.8"/>
    <circle cx="820" cy="360" r="3" fill="#E67E22" opacity="0.8"/>
    <circle cx="820" cy="390" r="3" fill="#E67E22" opacity="0.8"/>
    <circle cx="895" cy="320" r="3" fill="#E67E22" opacity="0.8"/>
    <circle cx="895" cy="360" r="3" fill="#E67E22" opacity="0.8"/>
    <circle cx="895" cy="400" r="3" fill="#E67E22" opacity="0.8"/>
  </g>

  <!-- Small diagnostic icons (left side) -->
  <!-- Magnifying glass -->
  <g transform="translate(120, 280)" opacity="0.4">
    <circle cx="0" cy="0" r="25" fill="none" stroke="#8ab4d4" stroke-width="2.5"/>
    <line x1="18" y1="18" x2="35" y2="35" stroke="#8ab4d4" stroke-width="2.5" stroke-linecap="round"/>
  </g>

  <!-- Diagnostic lines from magnifier to gauge -->
  <line x1="155" y1="280" x2="380" y2="320" stroke="#8ab4d4" stroke-width="1" stroke-dasharray="3,5" opacity="0.25"/>
  <line x1="155" y1="300" x2="380" y2="350" stroke="#8ab4d4" stroke-width="1" stroke-dasharray="3,5" opacity="0.2"/>

  <!-- Warning triangle indicators -->
  <g transform="translate(180, 430)" opacity="0.35">
    <polygon points="0,-18 16,12 -16,12" fill="none" stroke="#f39c12" stroke-width="2"/>
    <text x="0" y="8" text-anchor="middle" font-family="sans-serif" font-size="16" fill="#f39c12" font-weight="700">!</text>
  </g>
  <g transform="translate(240, 470)" opacity="0.25">
    <polygon points="0,-14 12,10 -12,10" fill="none" stroke="#f39c12" stroke-width="1.5"/>
    <text x="0" y="6" text-anchor="middle" font-family="sans-serif" font-size="12" fill="#f39c12" font-weight="700">!</text>
  </g>

  <!-- Metric bars (bottom-left area) -->
  <g transform="translate(80, 510)" opacity="0.3">
    <rect x="0" y="0" width="80" height="8" rx="4" fill="#1a3050"/>
    <rect x="0" y="0" width="60" height="8" rx="4" fill="#e74c3c"/>
    <rect x="0" y="16" width="80" height="8" rx="4" fill="#1a3050"/>
    <rect x="0" y="16" width="45" height="8" rx="4" fill="#f39c12"/>
    <rect x="0" y="32" width="80" height="8" rx="4" fill="#1a3050"/>
    <rect x="0" y="32" width="70" height="8" rx="4" fill="#e74c3c"/>
  </g>

  <!-- Title text -->
  <text x="600" y="80" text-anchor="middle" font-family="sans-serif" font-weight="700" font-size="28" fill="#ffffff" letter-spacing="1">SLOW QUERY DIAGNOSTICS</text>
  <text x="600" y="580" text-anchor="middle" font-family="sans-serif" font-weight="400" font-size="16" fill="#8ab4d4" letter-spacing="2">POSTGRESQL PERFORMANCE GUIDE</text>

  <!-- ReliaDB brand mark -->
  <g transform="translate(1140, 580)">
    <rect x="-22" y="-22" width="44" height="44" rx="10" fill="#1A5276"/>
    <text x="0" y="8" text-anchor="middle" font-family="sans-serif" font-weight="800" font-size="28" fill="#ffffff">R</text>
  </g>
</svg>