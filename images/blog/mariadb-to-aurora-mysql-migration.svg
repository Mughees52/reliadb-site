<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <linearGradient id="bg8" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0D2B3E"/>
      <stop offset="50%" stop-color="#1A5276"/>
      <stop offset="100%" stop-color="#0D2B3E"/>
    </linearGradient>
    <linearGradient id="mariadb" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#00758F"/>
      <stop offset="100%" stop-color="#005F73"/>
    </linearGradient>
    <linearGradient id="aurora" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#E67E22"/>
      <stop offset="100%" stop-color="#D35400"/>
    </linearGradient>
    <linearGradient id="pipeline8" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#00758F"/>
      <stop offset="50%" stop-color="#2980B9"/>
      <stop offset="100%" stop-color="#E67E22"/>
    </linearGradient>
    <linearGradient id="cloudFill" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#2980B9" stop-opacity="0.1"/>
      <stop offset="100%" stop-color="#1A5276" stop-opacity="0.05"/>
    </linearGradient>
    <filter id="glow8">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg8)"/>

  <!-- Left teal ambient glow -->
  <circle cx="230" cy="300" r="250" fill="#00758F" opacity="0.04"/>
  <!-- Right orange ambient glow -->
  <circle cx="970" cy="300" r="250" fill="#E67E22" opacity="0.04"/>

  <!-- Cloud shape in center -->
  <g transform="translate(600, 270)">
    <path d="M-120,-40 Q-120,-90 -70,-90 Q-50,-120 0,-110 Q50,-130 80,-90 Q130,-90 130,-40 Q160,-40 160,0 Q160,40 130,40 L-120,40 Q-160,40 -160,0 Q-160,-40 -120,-40 Z" fill="url(#cloudFill)" stroke="#2980B9" stroke-width="1.5" opacity="0.6"/>
    <!-- AWS DMS text -->
    <text x="0" y="-10" text-anchor="middle" font-family="sans-serif" font-size="14" font-weight="600" fill="#2980B9" opacity="0.6">AWS DMS</text>
    <!-- Data flow arrows inside cloud -->
    <g opacity="0.4">
      <line x1="-60" y1="15" x2="-20" y2="15" stroke="#2980B9" stroke-width="2"/>
      <polygon points="-22,11 -14,15 -22,19" fill="#2980B9"/>
      <line x1="20" y1="15" x2="60" y2="15" stroke="#E67E22" stroke-width="2"/>
      <polygon points="58,11 66,15 58,19" fill="#E67E22"/>
    </g>
  </g>

  <!-- MariaDB source (left) -->
  <g transform="translate(180, 290)">
    <!-- Glow ring -->
    <circle cx="0" cy="0" r="95" fill="none" stroke="#00758F" stroke-width="1" opacity="0.2"/>

    <!-- Database cylinder -->
    <ellipse cx="0" cy="-55" rx="65" ry="20" fill="#0D2B3E" stroke="#00758F" stroke-width="2.5"/>
    <rect x="-65" y="-55" width="130" height="110" fill="#0D2B3E" stroke="none"/>
    <line x1="-65" y1="-55" x2="-65" y2="55" stroke="#00758F" stroke-width="2.5"/>
    <line x1="65" y1="-55" x2="65" y2="55" stroke="#00758F" stroke-width="2.5"/>
    <ellipse cx="0" cy="55" rx="65" ry="20" fill="#0D2B3E" stroke="#00758F" stroke-width="2.5"/>

    <!-- Data rows -->
    <ellipse cx="0" cy="-25" rx="65" ry="18" fill="none" stroke="#00758F" stroke-width="1" opacity="0.3"/>
    <ellipse cx="0" cy="5" rx="65" ry="18" fill="none" stroke="#00758F" stroke-width="1" opacity="0.2"/>
    <ellipse cx="0" cy="35" rx="65" ry="18" fill="none" stroke="#00758F" stroke-width="1" opacity="0.15"/>

    <!-- Inner glow -->
    <ellipse cx="0" cy="-55" rx="55" ry="14" fill="#00758F" opacity="0.1"/>

    <!-- Label -->
    <text x="0" y="100" text-anchor="middle" font-family="sans-serif" font-size="18" font-weight="700" fill="#00758F">MariaDB</text>
  </g>

  <!-- Pipeline arrow (left to cloud) -->
  <g>
    <!-- Animated-looking dashed line -->
    <line x1="260" y1="290" x2="440" y2="290" stroke="url(#pipeline8)" stroke-width="3" stroke-dasharray="10,6" opacity="0.6"/>
    <!-- Data packets -->
    <rect x="290" y="282" width="16" height="16" rx="3" fill="#00758F" opacity="0.4"/>
    <rect x="340" y="282" width="16" height="16" rx="3" fill="#2980B9" opacity="0.3"/>
    <rect x="390" y="282" width="16" height="16" rx="3" fill="#2980B9" opacity="0.2"/>
  </g>

  <!-- Pipeline arrow (cloud to right) -->
  <g>
    <line x1="760" y1="290" x2="900" y2="290" stroke="url(#pipeline8)" stroke-width="3" stroke-dasharray="10,6" opacity="0.6"/>
    <!-- Data packets -->
    <rect x="790" y="282" width="16" height="16" rx="3" fill="#2980B9" opacity="0.2"/>
    <rect x="830" y="282" width="16" height="16" rx="3" fill="#E67E22" opacity="0.3"/>
    <rect x="870" y="282" width="16" height="16" rx="3" fill="#E67E22" opacity="0.4"/>
  </g>

  <!-- Aurora MySQL target (right) -->
  <g transform="translate(1000, 290)">
    <!-- Glow ring -->
    <circle cx="0" cy="0" r="95" fill="none" stroke="#E67E22" stroke-width="1" opacity="0.2"/>

    <!-- Database cylinder -->
    <ellipse cx="0" cy="-55" rx="65" ry="20" fill="#0D2B3E" stroke="#E67E22" stroke-width="2.5"/>
    <rect x="-65" y="-55" width="130" height="110" fill="#0D2B3E" stroke="none"/>
    <line x1="-65" y1="-55" x2="-65" y2="55" stroke="#E67E22" stroke-width="2.5"/>
    <line x1="65" y1="-55" x2="65" y2="55" stroke="#E67E22" stroke-width="2.5"/>
    <ellipse cx="0" cy="55" rx="65" ry="20" fill="#0D2B3E" stroke="#E67E22" stroke-width="2.5"/>

    <!-- Data rows -->
    <ellipse cx="0" cy="-25" rx="65" ry="18" fill="none" stroke="#E67E22" stroke-width="1" opacity="0.3"/>
    <ellipse cx="0" cy="5" rx="65" ry="18" fill="none" stroke="#E67E22" stroke-width="1" opacity="0.2"/>
    <ellipse cx="0" cy="35" rx="65" ry="18" fill="none" stroke="#E67E22" stroke-width="1" opacity="0.15"/>

    <!-- Inner glow -->
    <ellipse cx="0" cy="-55" rx="55" ry="14" fill="#E67E22" opacity="0.1"/>

    <!-- Aurora lightning bolt accent -->
    <path d="M10,-45 L-5,-20 L8,-20 L-8,5 L15,-25 L0,-25 Z" fill="#E67E22" opacity="0.2"/>

    <!-- Label -->
    <text x="0" y="100" text-anchor="middle" font-family="sans-serif" font-size="18" font-weight="700" fill="#E67E22">Aurora MySQL</text>
  </g>

  <!-- Decorative network dots -->
  <g opacity="0.15">
    <circle cx="400" cy="150" r="3" fill="#2980B9"/>
    <circle cx="500" cy="130" r="2" fill="#2980B9"/>
    <circle cx="700" cy="140" r="2.5" fill="#2980B9"/>
    <circle cx="800" cy="160" r="2" fill="#E67E22"/>
    <line x1="400" y1="150" x2="500" y2="130" stroke="#2980B9" stroke-width="0.5"/>
    <line x1="500" y1="130" x2="700" y2="140" stroke="#2980B9" stroke-width="0.5"/>
    <line x1="700" y1="140" x2="800" y2="160" stroke="#E67E22" stroke-width="0.5"/>

    <circle cx="350" cy="430" r="2" fill="#00758F"/>
    <circle cx="500" cy="450" r="3" fill="#2980B9"/>
    <circle cx="700" cy="440" r="2" fill="#2980B9"/>
    <circle cx="850" cy="430" r="2.5" fill="#E67E22"/>
    <line x1="350" y1="430" x2="500" y2="450" stroke="#00758F" stroke-width="0.5"/>
    <line x1="500" y1="450" x2="700" y2="440" stroke="#2980B9" stroke-width="0.5"/>
    <line x1="700" y1="440" x2="850" y2="430" stroke="#E67E22" stroke-width="0.5"/>
  </g>

  <!-- Title -->
  <text x="60" y="580" font-family="sans-serif" font-size="28" font-weight="700" fill="white" opacity="0.9">MariaDB to Aurora MySQL</text>
  <text x="60" y="610" font-family="sans-serif" font-size="18" fill="#2980B9" opacity="0.8">Migration via AWS DMS</text>

  <!-- ReliaDB brand mark -->
  <rect x="1130" y="570" width="44" height="44" rx="10" fill="#1A5276" stroke="#2980B9" stroke-width="1"/>
  <text x="1152" y="601" text-anchor="middle" font-family="sans-serif" font-size="26" font-weight="800" fill="white">R</text>
</svg>