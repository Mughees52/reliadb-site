<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" role="img" aria-label="Cross-account PMM monitoring cover image">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0f3551"/>
      <stop offset="55%" stop-color="#1A5276"/>
      <stop offset="100%" stop-color="#154360"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#E67E22"/>
      <stop offset="100%" stop-color="#F39C12"/>
    </linearGradient>
  </defs>

  <rect width="1200" height="630" fill="url(#bg)"/>
  <circle cx="1060" cy="90" r="180" fill="#ffffff" fill-opacity="0.06"/>
  <circle cx="140" cy="560" r="130" fill="#ffffff" fill-opacity="0.05"/>

  <g transform="translate(90,120)">
    <rect x="0" y="0" width="220" height="120" rx="14" fill="#ffffff" fill-opacity="0.1" stroke="#ffffff" stroke-opacity="0.28"/>
    <rect x="30" y="35" width="160" height="16" rx="8" fill="#ffffff" fill-opacity="0.75"/>
    <rect x="30" y="68" width="110" height="12" rx="6" fill="#ffffff" fill-opacity="0.5"/>

    <rect x="430" y="0" width="220" height="120" rx="14" fill="#ffffff" fill-opacity="0.1" stroke="#ffffff" stroke-opacity="0.28"/>
    <rect x="460" y="35" width="160" height="16" rx="8" fill="#ffffff" fill-opacity="0.75"/>
    <rect x="460" y="68" width="110" height="12" rx="6" fill="#ffffff" fill-opacity="0.5"/>

    <path d="M220 58 H430" stroke="url(#accent)" stroke-width="6" stroke-linecap="round"/>
    <polygon points="430,58 414,50 414,66" fill="#F39C12"/>
  </g>

  <text x="90" y="360" fill="#ffffff" font-family="Inter, Arial, sans-serif" font-size="56" font-weight="700">
    PMM Cross-Account Monitoring
  </text>
  <text x="90" y="418" fill="#d5e7f5" font-family="Inter, Arial, sans-serif" font-size="30" font-weight="500">
    AWS Transit Gateway, Alerting, Backup &amp; Recovery
  </text>
  <text x="90" y="500" fill="#F6C490" font-family="Inter, Arial, sans-serif" font-size="24" font-weight="600">
    ReliaDB Blog Series
  </text>
</svg>
