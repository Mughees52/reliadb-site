<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <linearGradient id="bg4" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1A5276"/>
      <stop offset="50%" stop-color="#1a4a5c"/>
      <stop offset="100%" stop-color="#0d3b3f"/>
    </linearGradient>
    <linearGradient id="shieldGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#2980B9"/>
      <stop offset="40%" stop-color="#1A5276"/>
      <stop offset="100%" stop-color="#0f2d42"/>
    </linearGradient>
    <linearGradient id="checkGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#2ecc71"/>
      <stop offset="100%" stop-color="#27ae60"/>
    </linearGradient>
    <linearGradient id="tealAccent" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#1abc9c" stop-opacity="0.6"/>
      <stop offset="100%" stop-color="#1abc9c" stop-opacity="0"/>
    </linearGradient>
    <filter id="shieldGlow">
      <feGaussianBlur stdDeviation="6" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="shadow4">
      <feDropShadow dx="0" dy="3" stdDeviation="6" flood-opacity="0.4"/>
    </filter>
    <filter id="greenGlow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg4)"/>

  <!-- Binary pattern background (subtle) -->
  <g font-family="monospace" font-size="14" fill="#1abc9c" opacity="0.06">
    <text x="30" y="40">10110010 01101001 11010010 00110101</text>
    <text x="80" y="70">01001101 10110100 01010011 10011010</text>
    <text x="20" y="100">11010011 00101101 10110010 01100110</text>
    <text x="90" y="130">00110110 11001010 01011001 10101100</text>
    <text x="40" y="160">10101001 01110010 11001101 00010111</text>
    <text x="700" y="50">01101010 10010110 11010100 01011001</text>
    <text x="750" y="80">11001001 01010110 00101011 10110011</text>
    <text x="680" y="110">10011010 11100101 01001101 10110100</text>
    <text x="720" y="500">01011010 10101001 11010010 00110110</text>
    <text x="60" y="500">10110100 01001101 10011010 01010011</text>
    <text x="100" y="530">01100110 11010011 00101101 10110010</text>
    <text x="760" y="530">11001010 00110110 01011001 10101100</text>
    <text x="30" y="560">00101011 10011010 11001001 01010110</text>
    <text x="700" y="560">10010110 01101010 01011001 11010100</text>
  </g>

  <!-- Central shield -->
  <g transform="translate(420, 300)" filter="url(#shadow4)">
    <!-- Shield shape -->
    <path d="M0,-160 L120,-110 L120,30 Q120,130 0,170 Q-120,130 -120,30 L-120,-110 Z"
          fill="url(#shieldGrad)" stroke="#2980B9" stroke-width="3"/>

    <!-- Inner shield border -->
    <path d="M0,-135 L100,-92 L100,25 Q100,108 0,142 Q-100,108 -100,25 L-100,-92 Z"
          fill="none" stroke="#2980B9" stroke-width="1.5" opacity="0.4"/>

    <!-- Checkmark inside shield -->
    <g filter="url(#greenGlow)">
      <polyline points="-40,10 -10,50 50,-40" fill="none" stroke="url(#checkGrad)" stroke-width="12" stroke-linecap="round" stroke-linejoin="round"/>
    </g>

    <!-- Lock keyhole (small, top of shield) -->
    <circle cx="0" cy="-80" r="16" fill="none" stroke="#4ab4d4" stroke-width="2" opacity="0.6"/>
    <rect x="-6" y="-75" width="12" height="18" rx="2" fill="#4ab4d4" opacity="0.4"/>
  </g>

  <!-- Verification chain nodes (right side) -->
  <g filter="url(#shadow4)">
    <!-- Node 1 -->
    <circle cx="750" cy="180" r="30" fill="#1a3a5c" stroke="#1abc9c" stroke-width="2"/>
    <text x="750" y="175" text-anchor="middle" font-family="monospace" font-size="10" fill="#1abc9c">CRC</text>
    <text x="750" y="192" text-anchor="middle" font-family="monospace" font-size="9" fill="#4ab4d4">a3f2</text>
    <polyline points="738,166 748,156 762,170" fill="none" stroke="#2ecc71" stroke-width="2" stroke-linecap="round"/>

    <!-- Node 2 -->
    <circle cx="850" cy="270" r="30" fill="#1a3a5c" stroke="#1abc9c" stroke-width="2"/>
    <text x="850" y="265" text-anchor="middle" font-family="monospace" font-size="10" fill="#1abc9c">CRC</text>
    <text x="850" y="282" text-anchor="middle" font-family="monospace" font-size="9" fill="#4ab4d4">7b1e</text>
    <polyline points="838,256 848,246 862,260" fill="none" stroke="#2ecc71" stroke-width="2" stroke-linecap="round"/>

    <!-- Node 3 -->
    <circle cx="750" cy="360" r="30" fill="#1a3a5c" stroke="#1abc9c" stroke-width="2"/>
    <text x="750" y="355" text-anchor="middle" font-family="monospace" font-size="10" fill="#1abc9c">CRC</text>
    <text x="750" y="372" text-anchor="middle" font-family="monospace" font-size="9" fill="#4ab4d4">d92c</text>
    <polyline points="738,346 748,336 762,350" fill="none" stroke="#2ecc71" stroke-width="2" stroke-linecap="round"/>

    <!-- Node 4 -->
    <circle cx="850" cy="450" r="30" fill="#1a3a5c" stroke="#1abc9c" stroke-width="2"/>
    <text x="850" y="445" text-anchor="middle" font-family="monospace" font-size="10" fill="#1abc9c">CRC</text>
    <text x="850" y="462" text-anchor="middle" font-family="monospace" font-size="9" fill="#4ab4d4">5e08</text>
    <polyline points="838,436 848,426 862,440" fill="none" stroke="#2ecc71" stroke-width="2" stroke-linecap="round"/>

    <!-- Chain connections -->
    <line x1="773" y1="200" x2="828" y2="250" stroke="#1abc9c" stroke-width="2" opacity="0.5"/>
    <line x1="828" y1="290" x2="773" y2="340" stroke="#1abc9c" stroke-width="2" opacity="0.5"/>
    <line x1="773" y1="380" x2="828" y2="430" stroke="#1abc9c" stroke-width="2" opacity="0.5"/>
  </g>

  <!-- Connection from shield to chain -->
  <path d="M540 250 Q640 210 720 185" fill="none" stroke="#1abc9c" stroke-width="1.5" stroke-dasharray="6,4" opacity="0.35"/>
  <path d="M540 310 Q640 300 720 360" fill="none" stroke="#1abc9c" stroke-width="1.5" stroke-dasharray="6,4" opacity="0.3"/>
  <path d="M540 370 Q660 430 720 450" fill="none" stroke="#1abc9c" stroke-width="1.5" stroke-dasharray="6,4" opacity="0.25"/>

  <!-- Data page icons (left side) -->
  <g opacity="0.35">
    <!-- Page 1 -->
    <rect x="100" y="200" width="50" height="65" rx="5" fill="none" stroke="#4ab4d4" stroke-width="1.5"/>
    <line x1="110" y1="218" x2="140" y2="218" stroke="#4ab4d4" stroke-width="1"/>
    <line x1="110" y1="230" x2="135" y2="230" stroke="#4ab4d4" stroke-width="1"/>
    <line x1="110" y1="242" x2="140" y2="242" stroke="#4ab4d4" stroke-width="1"/>
    <polyline points="118,252 124,258 136,248" fill="none" stroke="#2ecc71" stroke-width="1.5" stroke-linecap="round"/>

    <!-- Page 2 -->
    <rect x="165" y="230" width="50" height="65" rx="5" fill="none" stroke="#4ab4d4" stroke-width="1.5"/>
    <line x1="175" y1="248" x2="205" y2="248" stroke="#4ab4d4" stroke-width="1"/>
    <line x1="175" y1="260" x2="200" y2="260" stroke="#4ab4d4" stroke-width="1"/>
    <line x1="175" y1="272" x2="205" y2="272" stroke="#4ab4d4" stroke-width="1"/>
    <polyline points="183,282 189,288 201,278" fill="none" stroke="#2ecc71" stroke-width="1.5" stroke-linecap="round"/>

    <!-- Page 3 -->
    <rect x="100" y="310" width="50" height="65" rx="5" fill="none" stroke="#4ab4d4" stroke-width="1.5"/>
    <line x1="110" y1="328" x2="140" y2="328" stroke="#4ab4d4" stroke-width="1"/>
    <line x1="110" y1="340" x2="135" y2="340" stroke="#4ab4d4" stroke-width="1"/>
    <line x1="110" y1="352" x2="140" y2="352" stroke="#4ab4d4" stroke-width="1"/>
    <polyline points="118,362 124,368 136,358" fill="none" stroke="#2ecc71" stroke-width="1.5" stroke-linecap="round"/>
  </g>

  <!-- Arrows from pages to shield -->
  <line x1="155" y1="240" x2="300" y2="280" stroke="#4ab4d4" stroke-width="1" stroke-dasharray="4,4" opacity="0.2"/>
  <line x1="220" y1="265" x2="300" y2="300" stroke="#4ab4d4" stroke-width="1" stroke-dasharray="4,4" opacity="0.2"/>
  <line x1="155" y1="345" x2="300" y2="320" stroke="#4ab4d4" stroke-width="1" stroke-dasharray="4,4" opacity="0.2"/>

  <!-- Title text -->
  <text x="600" y="75" text-anchor="middle" font-family="sans-serif" font-weight="700" font-size="28" fill="#ffffff" letter-spacing="1">DATA INTEGRITY CHECKSUMS</text>
  <text x="600" y="580" text-anchor="middle" font-family="sans-serif" font-weight="400" font-size="16" fill="#8ab4d4" letter-spacing="2">POSTGRESQL SETUP GUIDE</text>

  <!-- ReliaDB brand mark -->
  <g transform="translate(1140, 580)">
    <rect x="-22" y="-22" width="44" height="44" rx="10" fill="#1A5276"/>
    <text x="0" y="8" text-anchor="middle" font-family="sans-serif" font-weight="800" font-size="28" fill="#ffffff">R</text>
  </g>
</svg>