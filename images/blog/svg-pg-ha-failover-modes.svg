<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 920 580">
  <defs>
    <filter id="shadow3" x="-4%" y="-4%" width="108%" height="108%">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-color="#000" flood-opacity="0.3"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="920" height="580" rx="12" fill="#1a1a2e"/>

  <!-- Title -->
  <text x="460" y="40" text-anchor="middle" fill="#ffffff" font-family="Inter, sans-serif" font-size="22" font-weight="700">Failover Modes</text>
  <line x1="330" y1="52" x2="590" y2="52" stroke="#E67E22" stroke-width="2"/>

  <!-- Divider line -->
  <line x1="460" y1="70" x2="460" y2="540" stroke="#333355" stroke-width="1" stroke-dasharray="8,4"/>

  <!-- LEFT: Automatic Mode Header -->
  <rect x="30" y="70" width="400" height="40" rx="8" fill="#2980B9" opacity="0.15"/>
  <text x="230" y="96" text-anchor="middle" fill="#2980B9" font-family="Inter, sans-serif" font-size="16" font-weight="700">Automatic Mode</text>

  <!-- RIGHT: Manual Mode Header -->
  <rect x="490" y="70" width="400" height="40" rx="8" fill="#E67E22" opacity="0.15"/>
  <text x="690" y="96" text-anchor="middle" fill="#E67E22" font-family="Inter, sans-serif" font-size="16" font-weight="700">Manual Mode</text>

  <!-- Timeline axis labels -->
  <text x="55" y="135" fill="#666688" font-family="Inter, sans-serif" font-size="11" font-weight="600">TIME</text>
  <text x="515" y="135" fill="#666688" font-family="Inter, sans-serif" font-size="11" font-weight="600">TIME</text>

  <!-- ========== LEFT: Automatic Timeline ========== -->

  <!-- Step 1: Primary Dies (0s) -->
  <text x="55" y="165" fill="#888" font-family="Inter, sans-serif" font-size="11">0s</text>
  <rect x="85" y="148" width="330" height="36" rx="8" fill="#16213e" stroke="#ff4444" stroke-width="2" filter="url(#shadow3)"/>
  <circle cx="105" cy="166" r="8" fill="#ff4444"/>
  <text x="115" y="162" fill="#ff4444" font-family="Inter, sans-serif" font-size="10" font-weight="700" dx="5">X</text>
  <text x="135" y="171" fill="#ffffff" font-family="Inter, sans-serif" font-size="13" font-weight="600">Primary Dies</text>

  <!-- Step 2: Orchestrator Detects (3s) -->
  <text x="55" y="215" fill="#888" font-family="Inter, sans-serif" font-size="11">3s</text>
  <rect x="85" y="198" width="330" height="36" rx="8" fill="#16213e" stroke="#E67E22" stroke-width="2" filter="url(#shadow3)"/>
  <text x="105" y="221" fill="#E67E22" font-family="Inter, sans-serif" font-size="13" font-weight="600">Orchestrator Detects DeadPrimary</text>

  <!-- Step 3: pg_promote() (3s) -->
  <text x="55" y="265" fill="#888" font-family="Inter, sans-serif" font-size="11">3s</text>
  <rect x="85" y="248" width="330" height="36" rx="8" fill="#16213e" stroke="#E67E22" stroke-width="2" filter="url(#shadow3)"/>
  <text x="105" y="271" fill="#ffffff" font-family="Inter, sans-serif" font-size="13" font-weight="600">pg_promote() called on replica</text>

  <!-- Step 4: ProxySQL reroutes (5s) -->
  <text x="55" y="315" fill="#888" font-family="Inter, sans-serif" font-size="11">5s</text>
  <rect x="85" y="298" width="330" height="36" rx="8" fill="#16213e" stroke="#2980B9" stroke-width="2" filter="url(#shadow3)"/>
  <text x="105" y="321" fill="#ffffff" font-family="Inter, sans-serif" font-size="13" font-weight="600">ProxySQL reroutes traffic</text>

  <!-- Step 5: Writes Restored (7-9s) -->
  <text x="47" y="365" fill="#888" font-family="Inter, sans-serif" font-size="11">7-9s</text>
  <rect x="85" y="348" width="330" height="36" rx="8" fill="#16213e" stroke="#27ae60" stroke-width="2.5" filter="url(#shadow3)"/>
  <circle cx="105" cy="366" r="8" fill="#27ae60"/>
  <text x="125" y="371" fill="#27ae60" font-family="Inter, sans-serif" font-size="13" font-weight="700">Writes Restored</text>

  <!-- ========== RIGHT: Manual Timeline ========== -->

  <!-- Step 1: Primary Dies (0s) -->
  <text x="515" y="165" fill="#888" font-family="Inter, sans-serif" font-size="11">0s</text>
  <rect x="545" y="148" width="340" height="36" rx="8" fill="#16213e" stroke="#ff4444" stroke-width="2" filter="url(#shadow3)"/>
  <circle cx="565" cy="166" r="8" fill="#ff4444"/>
  <text x="575" y="162" fill="#ff4444" font-family="Inter, sans-serif" font-size="10" font-weight="700" dx="5">X</text>
  <text x="595" y="171" fill="#ffffff" font-family="Inter, sans-serif" font-size="13" font-weight="600">Primary Dies</text>

  <!-- Step 2: Orchestrator Detects (3s) -->
  <text x="515" y="215" fill="#888" font-family="Inter, sans-serif" font-size="11">3s</text>
  <rect x="545" y="198" width="340" height="36" rx="8" fill="#16213e" stroke="#E67E22" stroke-width="2" filter="url(#shadow3)"/>
  <text x="565" y="221" fill="#E67E22" font-family="Inter, sans-serif" font-size="13" font-weight="600">Orchestrator Detects</text>

  <!-- Step 3: NOT Recovering -->
  <rect x="545" y="248" width="340" height="36" rx="8" fill="#16213e" stroke="#ff4444" stroke-width="1.5" stroke-dasharray="6,3" filter="url(#shadow3)"/>
  <text x="565" y="271" fill="#ff4444" font-family="Inter, sans-serif" font-size="13" font-weight="600">NOT Recovering (recovery disabled)</text>

  <!-- Step 4: Operator Investigates (?) -->
  <text x="515" y="315" fill="#888" font-family="Inter, sans-serif" font-size="11">?</text>
  <rect x="545" y="298" width="340" height="36" rx="8" fill="#16213e" stroke="#888" stroke-width="1.5" filter="url(#shadow3)"/>
  <text x="565" y="321" fill="#aaaacc" font-family="Inter, sans-serif" font-size="13" font-weight="600">Operator Investigates Root Cause</text>

  <!-- Step 5: curl /api/recover -->
  <rect x="545" y="348" width="340" height="36" rx="8" fill="#16213e" stroke="#E67E22" stroke-width="2" filter="url(#shadow3)"/>
  <text x="565" y="371" fill="#E67E22" font-family="Inter, sans-serif" font-size="12" font-weight="600" font-style="italic">curl /api/recover  +  pg_promote()</text>

  <!-- Step 6: Writes Restored -->
  <rect x="545" y="398" width="340" height="36" rx="8" fill="#16213e" stroke="#27ae60" stroke-width="2.5" filter="url(#shadow3)"/>
  <circle cx="565" cy="416" r="8" fill="#27ae60"/>
  <text x="585" y="421" fill="#27ae60" font-family="Inter, sans-serif" font-size="13" font-weight="700">Writes Restored</text>

  <!-- ========== Status Bars ========== -->

  <!-- Left side bars -->
  <text x="85" y="420" fill="#ffffff" font-family="Inter, sans-serif" font-size="12" font-weight="600">Traffic Status:</text>

  <!-- Reads bar (green, full width = always available) -->
  <text x="85" y="445" fill="#27ae60" font-family="Inter, sans-serif" font-size="11" font-weight="600">Reads</text>
  <rect x="130" y="434" width="285" height="18" rx="4" fill="#27ae60" opacity="0.3" stroke="#27ae60" stroke-width="1"/>
  <text x="272" y="447" text-anchor="middle" fill="#27ae60" font-family="Inter, sans-serif" font-size="10" font-weight="600">AVAILABLE (replicas serve reads)</text>

  <!-- Writes bar (red gap then green) -->
  <text x="85" y="473" fill="#E67E22" font-family="Inter, sans-serif" font-size="11" font-weight="600">Writes</text>
  <rect x="130" y="462" width="180" height="18" rx="4" fill="#ff4444" opacity="0.3" stroke="#ff4444" stroke-width="1"/>
  <text x="220" y="475" text-anchor="middle" fill="#ff4444" font-family="Inter, sans-serif" font-size="10" font-weight="600">UNAVAILABLE</text>
  <rect x="310" y="462" width="105" height="18" rx="4" fill="#27ae60" opacity="0.3" stroke="#27ae60" stroke-width="1"/>
  <text x="362" y="475" text-anchor="middle" fill="#27ae60" font-family="Inter, sans-serif" font-size="10" font-weight="600">OK</text>
  <text x="318" y="492" text-anchor="middle" fill="#E67E22" font-family="Inter, sans-serif" font-size="10" font-weight="700">~7-9s downtime</text>

  <!-- Right side bars -->
  <text x="545" y="460" fill="#ffffff" font-family="Inter, sans-serif" font-size="12" font-weight="600">Traffic Status:</text>

  <!-- Reads bar -->
  <text x="545" y="485" fill="#27ae60" font-family="Inter, sans-serif" font-size="11" font-weight="600">Reads</text>
  <rect x="590" y="474" width="295" height="18" rx="4" fill="#27ae60" opacity="0.3" stroke="#27ae60" stroke-width="1"/>
  <text x="737" y="487" text-anchor="middle" fill="#27ae60" font-family="Inter, sans-serif" font-size="10" font-weight="600">AVAILABLE (replicas serve reads)</text>

  <!-- Writes bar (longer red gap) -->
  <text x="545" y="513" fill="#E67E22" font-family="Inter, sans-serif" font-size="11" font-weight="600">Writes</text>
  <rect x="590" y="502" width="230" height="18" rx="4" fill="#ff4444" opacity="0.3" stroke="#ff4444" stroke-width="1"/>
  <text x="705" y="515" text-anchor="middle" fill="#ff4444" font-family="Inter, sans-serif" font-size="10" font-weight="600">UNAVAILABLE</text>
  <rect x="820" y="502" width="65" height="18" rx="4" fill="#27ae60" opacity="0.3" stroke="#27ae60" stroke-width="1"/>
  <text x="852" y="515" text-anchor="middle" fill="#27ae60" font-family="Inter, sans-serif" font-size="10" font-weight="600">OK</text>
  <text x="750" y="535" text-anchor="middle" fill="#E67E22" font-family="Inter, sans-serif" font-size="10" font-weight="700">Minutes of downtime (operator-dependent)</text>

  <!-- Bottom comparison note -->
  <rect x="100" y="548" width="720" height="25" rx="6" fill="#16213e" opacity="0.5"/>
  <text x="460" y="565" text-anchor="middle" fill="#aaaacc" font-family="Inter, sans-serif" font-size="11">Automatic = faster recovery, higher risk of split-brain  |  Manual = slower recovery, operator verifies before promoting</text>
</svg>