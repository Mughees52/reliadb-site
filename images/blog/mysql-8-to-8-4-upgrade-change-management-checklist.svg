<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <linearGradient id="bg5" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0D2B3E"/>
      <stop offset="100%" stop-color="#1A5276"/>
    </linearGradient>
    <linearGradient id="orange5" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#E67E22"/>
      <stop offset="100%" stop-color="#D35400"/>
    </linearGradient>
    <linearGradient id="green5" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#27AE60"/>
      <stop offset="100%" stop-color="#1E8449"/>
    </linearGradient>
    <pattern id="grid5" width="60" height="60" patternUnits="userSpaceOnUse">
      <path d="M 60 0 L 0 0 0 60" fill="none" stroke="#1A5276" stroke-width="0.5" opacity="0.3"/>
    </pattern>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg5)"/>
  <rect width="1200" height="630" fill="url(#grid5)"/>

  <!-- Decorative -->
  <circle cx="600" cy="315" r="260" fill="#2980B9" opacity="0.03"/>

  <!-- Upgrade series band -->
  <rect x="0" y="0" width="1200" height="6" fill="url(#orange5)"/>

  <!-- Workflow pipeline: connected nodes -->
  <!-- Node 1 -->
  <g transform="translate(180, 260)">
    <circle cx="0" cy="0" r="40" fill="#0D2B3E" stroke="#00758F" stroke-width="2.5"/>
    <circle cx="0" cy="0" r="28" fill="#00758F" opacity="0.15"/>
    <text x="0" y="6" text-anchor="middle" font-family="sans-serif" font-size="16" font-weight="700" fill="#00758F">1</text>
  </g>
  <!-- Connector 1-2 -->
  <line x1="220" y1="260" x2="300" y2="260" stroke="#2980B9" stroke-width="2.5" opacity="0.5"/>
  <circle cx="260" cy="260" r="3" fill="#2980B9" opacity="0.5"/>

  <!-- Node 2 -->
  <g transform="translate(340, 260)">
    <circle cx="0" cy="0" r="40" fill="#0D2B3E" stroke="#2980B9" stroke-width="2.5"/>
    <circle cx="0" cy="0" r="28" fill="#2980B9" opacity="0.15"/>
    <text x="0" y="6" text-anchor="middle" font-family="sans-serif" font-size="16" font-weight="700" fill="#2980B9">2</text>
  </g>
  <!-- Connector 2-3 -->
  <line x1="380" y1="260" x2="460" y2="260" stroke="#2980B9" stroke-width="2.5" opacity="0.5"/>
  <circle cx="420" cy="260" r="3" fill="#2980B9" opacity="0.5"/>

  <!-- Node 3 -->
  <g transform="translate(500, 260)">
    <circle cx="0" cy="0" r="40" fill="#0D2B3E" stroke="#2980B9" stroke-width="2.5"/>
    <circle cx="0" cy="0" r="28" fill="#2980B9" opacity="0.15"/>
    <text x="0" y="6" text-anchor="middle" font-family="sans-serif" font-size="16" font-weight="700" fill="#2980B9">3</text>
  </g>
  <!-- Connector 3-4 -->
  <line x1="540" y1="260" x2="620" y2="260" stroke="#2980B9" stroke-width="2.5" opacity="0.5"/>
  <circle cx="580" cy="260" r="3" fill="#2980B9" opacity="0.5"/>

  <!-- Node 4 -->
  <g transform="translate(660, 260)">
    <circle cx="0" cy="0" r="40" fill="#0D2B3E" stroke="#E67E22" stroke-width="2.5"/>
    <circle cx="0" cy="0" r="28" fill="#E67E22" opacity="0.15"/>
    <text x="0" y="6" text-anchor="middle" font-family="sans-serif" font-size="16" font-weight="700" fill="#E67E22">4</text>
  </g>
  <!-- Connector 4-5 -->
  <line x1="700" y1="260" x2="780" y2="260" stroke="#E67E22" stroke-width="2.5" opacity="0.5"/>
  <circle cx="740" cy="260" r="3" fill="#E67E22" opacity="0.5"/>

  <!-- Node 5 (completion) -->
  <g transform="translate(820, 260)">
    <circle cx="0" cy="0" r="48" fill="#0D2B3E" stroke="#27AE60" stroke-width="3"/>
    <circle cx="0" cy="0" r="34" fill="#27AE60" opacity="0.15"/>
    <!-- Checkmark -->
    <polyline points="-16,2 -5,14 18,-10" fill="none" stroke="#27AE60" stroke-width="4" stroke-linecap="round" stroke-linejoin="round"/>
  </g>

  <!-- Branch from node 2 downward -->
  <line x1="340" y1="300" x2="340" y2="370" stroke="#2980B9" stroke-width="1.5" opacity="0.3"/>
  <circle cx="340" cy="390" r="20" fill="#0D2B3E" stroke="#2980B9" stroke-width="1.5" opacity="0.3"/>
  <text x="340" y="395" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#2980B9" opacity="0.5">2a</text>

  <!-- Branch from node 3 downward -->
  <line x1="500" y1="300" x2="500" y2="370" stroke="#2980B9" stroke-width="1.5" opacity="0.3"/>
  <circle cx="500" cy="390" r="20" fill="#0D2B3E" stroke="#2980B9" stroke-width="1.5" opacity="0.3"/>
  <text x="500" y="395" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#2980B9" opacity="0.5">3a</text>

  <!-- Branch from node 4 upward -->
  <line x1="660" y1="220" x2="660" y2="150" stroke="#E67E22" stroke-width="1.5" opacity="0.3"/>
  <circle cx="660" cy="130" r="20" fill="#0D2B3E" stroke="#E67E22" stroke-width="1.5" opacity="0.3"/>
  <text x="660" y="135" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#E67E22" opacity="0.5">4a</text>

  <!-- Progress bar at bottom of pipeline -->
  <rect x="140" y="335" width="720" height="6" rx="3" fill="#1A5276"/>
  <rect x="140" y="335" width="720" height="6" rx="3" fill="url(#green5)" opacity="0.4"/>

  <!-- Decorative document icons -->
  <g transform="translate(1000, 180)" opacity="0.3">
    <rect x="0" y="0" width="60" height="75" rx="4" fill="none" stroke="#2980B9" stroke-width="1.5"/>
    <path d="M40,0 L60,20" stroke="#2980B9" stroke-width="1.5" fill="none"/>
    <line x1="12" y1="35" x2="48" y2="35" stroke="#2980B9" stroke-width="1"/>
    <line x1="12" y1="45" x2="40" y2="45" stroke="#2980B9" stroke-width="1"/>
    <line x1="12" y1="55" x2="44" y2="55" stroke="#2980B9" stroke-width="1"/>
  </g>
  <g transform="translate(980, 300)" opacity="0.2">
    <rect x="0" y="0" width="50" height="65" rx="4" fill="none" stroke="#00758F" stroke-width="1.5"/>
    <line x1="10" y1="25" x2="40" y2="25" stroke="#00758F" stroke-width="1"/>
    <line x1="10" y1="35" x2="35" y2="35" stroke="#00758F" stroke-width="1"/>
    <line x1="10" y1="45" x2="38" y2="45" stroke="#00758F" stroke-width="1"/>
  </g>

  <!-- Part 5 badge -->
  <rect x="1000" y="30" width="150" height="50" rx="25" fill="url(#orange5)"/>
  <text x="1075" y="62" text-anchor="middle" font-family="sans-serif" font-size="22" font-weight="700" fill="white">Part 5</text>

  <!-- Title -->
  <text x="60" y="580" font-family="sans-serif" font-size="28" font-weight="700" fill="white" opacity="0.9">MySQL 8.0 to 8.4 Upgrade</text>
  <text x="60" y="610" font-family="sans-serif" font-size="18" fill="#2980B9" opacity="0.8">Change Management Checklist</text>

  <!-- ReliaDB brand mark -->
  <rect x="1130" y="570" width="44" height="44" rx="10" fill="#1A5276" stroke="#2980B9" stroke-width="1"/>
  <text x="1152" y="601" text-anchor="middle" font-family="sans-serif" font-size="26" font-weight="800" fill="white">R</text>
</svg>