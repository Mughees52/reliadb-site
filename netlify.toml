# Netlify Configuration for ReliaDB
# =====================================
# This file tells Netlify how to build and serve the site.
# Build: npm run build (Eleventy + Pagefind search index).

[build]
  command = "npm run build"
  publish = "_site"

# Enable Netlify Identity (required for Decap CMS login)
# After deploying, go to: Netlify dashboard → Site settings → Identity → Enable
# Then: Identity → Services → Git Gateway → Enable

[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Permissions-Policy = "camera=(), microphone=(), geolocation=()"
    Content-Security-Policy = "upgrade-insecure-requests"
    Strict-Transport-Security = "max-age=31536000; includeSubDomains; preload"

[[headers]]
  for = "/admin/*"
  [headers.values]
    X-Robots-Tag = "noindex"

# Force HTTPS — redirect all HTTP traffic to HTTPS
[[redirects]]
  from = "http://reliadb.com/*"
  to = "https://reliadb.com/:splat"
  status = 301
  force = true

[[redirects]]
  from = "http://www.reliadb.com/*"
  to = "https://reliadb.com/:splat"
  status = 301
  force = true

[[redirects]]
  from = "https://www.reliadb.com/*"
  to = "https://reliadb.com/:splat"
  status = 301
  force = true

# Redirect trailing slashes (optional, cleaner URLs)
[[redirects]]
  from = "/blog/"
  to = "/blog/index.html"
  status = 200

[[redirects]]
  from = "/search/"
  to = "/search/index.html"
  status = 200

[[redirects]]
  from = "/services/"
  to = "/services.html"
  status = 200
